<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Dungeon Action Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #08080c;
            --bg-radial: radial-gradient(circle at center, #1b1614 0%, #060505 100%);
            --panel-bg: rgba(18, 16, 15, 0.92);
            --border-glow: rgba(234, 179, 8, 0.2);
            --border-card: rgba(255, 255, 255, 0.04);
            --accent-gold: #fbbf24;
            --accent-rose: #f43f5e;
            --accent-cyan: #10b981;
            --accent-green: #22c55e;
            --accent-indigo: #854d0e;
            --text-main: #f1f5f9;
            --text-muted: #8b8b9c;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            background-color: var(--bg-dark);
            background-image: var(--bg-radial);
            color: var(--text-main);
            font-family: 'Outfit', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
        }

        .game-wrapper {
            width: 100vw;
            height: 100vh;
            max-width: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 2px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 20px;
            margin: 0 0 4px 0;
            color: #ffffff;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 30%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.45));
        }

        .description {
            display: none;
        }

        .description::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-indigo);
            box-shadow: 0 0 8px var(--accent-indigo);
        }

        #canvasContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(99, 102, 241, 0.1);
            overflow: hidden;
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: #09090d;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            width: 100%;
            height: 100%;
            object-fit: contain;
            touch-action: none;
        }

        .control-panel {
            display: none;
        }

        .char-select {
            display: flex;
            gap: 8px;
        }

        button {
            font-family: 'Orbitron', 'Outfit', sans-serif;
            background: rgba(255, 255, 255, 0.03);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transform: translateY(-1px);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        /* Ayn - Gold Accent */
        #btnChar0.active {
            background: rgba(251, 191, 36, 0.12);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            text-shadow: 0 0 5px rgba(251, 191, 36, 0.4);
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.2), inset 0 0 8px rgba(251, 191, 36, 0.05);
        }
        #btnChar0::after {
            content: '';
            position: absolute;
            bottom: 0; left: 15%; right: 15%; height: 2px;
            background: var(--accent-gold);
            opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 0 8px var(--accent-gold);
        }
        #btnChar0.active::after { opacity: 1; }

        /* Luna - Rose Accent */
        #btnChar1.active {
            background: rgba(244, 63, 94, 0.12);
            border-color: var(--accent-rose);
            color: var(--accent-rose);
            text-shadow: 0 0 5px rgba(244, 63, 94, 0.4);
            box-shadow: 0 0 12px rgba(244, 63, 94, 0.2), inset 0 0 8px rgba(244, 63, 94, 0.05);
        }
        #btnChar1::after {
            content: '';
            position: absolute;
            bottom: 0; left: 15%; right: 15%; height: 2px;
            background: var(--accent-rose);
            opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 0 8px var(--accent-rose);
        }
        #btnChar1.active::after { opacity: 1; }

        /* Seria - Cyan Accent */
        #btnChar2.active {
            background: rgba(6, 182, 212, 0.12);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            text-shadow: 0 0 5px rgba(6, 182, 212, 0.4);
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.2), inset 0 0 8px rgba(6, 182, 212, 0.05);
        }
        #btnChar2::after {
            content: '';
            position: absolute;
            bottom: 0; left: 15%; right: 15%; height: 2px;
            background: var(--accent-cyan);
            opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 0 8px var(--accent-cyan);
        }
        #btnChar2.active::after { opacity: 1; }

        .seed-panel {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
        }

        input {
            background-color: rgba(0, 0, 0, 0.4);
            color: #f3f4f6;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 10px;
            width: 80px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent-indigo);
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
            background-color: rgba(0, 0, 0, 0.6);
        }

        .seed-panel button {
            background: var(--accent-indigo);
            border-color: var(--accent-indigo);
            color: white;
            padding: 7px 14px;
        }
        .seed-panel button:hover {
            background: #4f46e5;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.35);
        }

        /* 샵 오버레이 UI */
        #shopUI {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translate(-50%, -10px);
            background: rgba(8, 8, 12, 0.9);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(251, 191, 36, 0.3);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
            box-shadow: 0 0 35px rgba(251, 191, 36, 0.08), 0 25px 50px rgba(0, 0, 0, 0.95);
            width: 320px;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #shopUI.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        #shopUI h3 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            color: var(--accent-gold);
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.3);
        }

        #shopItemsContainer {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        #shopItemsContainer button {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 44px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            padding: 0 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #shopItemsContainer button:not(.bought) {
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 100%), var(--btn-color, #6366f1);
            border-color: var(--btn-color, #6366f1);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        #shopItemsContainer button.bought {
            background: #18181b !important;
            border-color: rgba(255, 255, 255, 0.04) !important;
            color: var(--text-muted) !important;
            cursor: not-allowed;
        }

        #shopItemsContainer button:hover:not(:disabled):not(.bought) {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), 0 0 10px var(--btn-color);
        }

        #shopItemsContainer button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            filter: none;
        }

        .shop-cost-tag {
            background: rgba(0, 0, 0, 0.35);
            padding: 3px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #btnHealFull {
            width: 100%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;
            color: white !important;
            border: none !important;
            padding: 10px !important;
            font-weight: 700 !important;
            border-radius: 8px !important;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Outfit', sans-serif !important;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        
        #btnHealFull:hover:not(:disabled) {
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.35);
            transform: scale(1.02);
        }

        #btnHealFull:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #btnReroll {
            width: 100%;
            background: transparent !important;
            color: #cbd5e1 !important;
            border: 1px solid rgba(99, 102, 241, 0.3) !important;
            padding: 9px !important;
            border-radius: 8px !important;
            cursor: pointer;
            font-family: 'Outfit', sans-serif !important;
            transition: all 0.2s !important;
        }

        #btnReroll:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.08) !important;
            border-color: var(--accent-indigo) !important;
            color: #ffffff !important;
        }
        
        #btnReroll:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* 게임오버 스크린 */
        #gameOverScreen {
            display: none; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(3, 3, 5, 0.9); 
            z-index: 10; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #gameOverScreen.show {
            opacity: 1;
        }

        #gameOverScreen h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 36px;
            margin: 0 0 12px 0;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #f43f5e 0%, #be123c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(244, 63, 94, 0.5));
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(244, 63, 94, 0.4)); }
            50% { filter: drop-shadow(0 0 16px rgba(244, 63, 94, 0.7)); }
        }

        .go-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            padding: 16px 36px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            margin-bottom: 24px;
        }

        .go-card p {
            margin: 0;
            font-size: 15px;
            color: #94a3b8;
            font-family: 'Outfit', sans-serif;
        }

        .go-card strong {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
        }

        #gameOverScreen button {
            background: var(--accent-indigo);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 14px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
        }

        #gameOverScreen button:hover {
            background: #4f46e5;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            transform: scale(1.03);
        }

        /* 치지직 설정 오버레이 UI */
        .overlay-panel {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -10px);
            background: rgba(8, 8, 12, 0.95);
            padding: 22px;
            border-radius: 16px;
            border: 1px solid rgba(6, 182, 212, 0.35); /* Cyan 네온 테두리 */
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            pointer-events: auto;
            box-shadow: 0 0 35px rgba(6, 182, 212, 0.08), 0 25px 50px rgba(0, 0, 0, 0.95);
            width: 340px;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .overlay-panel.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .overlay-panel h3 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 1.5px;
            color: var(--accent-cyan);
            text-shadow: 0 0 8px rgba(6, 182, 212, 0.4);
        }

        .chzzk-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            align-items: flex-start;
        }

        .chzzk-input-group label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }

        .chzzk-input-group input {
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-family: 'Outfit', sans-serif;
        }
        
        .chzzk-input-group input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.25);
        }

        .chzzk-input-group small {
            font-size: 9px;
            color: #64748b;
        }

        .chzzk-btn-group {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .chzzk-btn-group button {
            flex-grow: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
        }

        #btnConnectChzzk {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border: none;
            color: white;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
        }
        #btnConnectChzzk:hover {
            box-shadow: 0 6px 16px rgba(6, 182, 212, 0.35);
            transform: scale(1.02);
        }

        .status-indicator {
            font-size: 11px;
            font-weight: 700;
            color: #cbd5e1;
        }

        .chzzk-log {
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: #a7f3d0;
            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap;
        }

        .close-btn {
            width: 100%;
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: rgba(255,255,255,0.03);
            color: white;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <header>
            <h1>Pixel Dungeon Action</h1>
        </header>

        <div id="canvasContainer">
            <canvas id="gameCanvas" width="960" height="480"></canvas>
            
            <!-- 치지직 설정 열기 버튼 -->
            <button id="btnOpenChzzkUI" style="position: absolute; top: 12px; right: 12px; z-index: 9; background: rgba(8, 8, 12, 0.75); border: 1px solid rgba(255, 255, 255, 0.15); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; padding: 0; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='rgba(6, 182, 212, 0.25)'; this.style.borderColor='rgba(6, 182, 212, 0.6)'" onmouseout="this.style.background='rgba(8, 8, 12, 0.75)'; this.style.borderColor='rgba(255, 255, 255, 0.15)'">⚙️</button>

            <!-- 치지직 설정 오버레이 UI -->
            <div id="chzzkUI" class="overlay-panel">
                <h3>📢 CHZZK CHAT SYNC</h3>
                
                <!-- 중계 서버 주소 설정 영역 (CORS 방지를 위해 필수 가동) -->
                <div class="chzzk-input-group" style="margin-bottom: 2px;">
                    <label>중계 서버 주소 (Socket.io)</label>
                    <input type="text" id="localProxyUrl" value="http://localhost:3000" placeholder="예: http://localhost:3000" style="width: 100%;">
                </div>

                <div class="chzzk-input-group">
                    <label>치지직 채널 ID 또는 방송 URL</label>
                    <input type="text" id="chzzkChannelId" placeholder="예: https://chzzk.naver.com/...">
                    <small style="color: #64748b; font-size: 9px;">※ 스트리머 채널 주소를 그대로 붙여넣으세요.</small>
                </div>
                <div class="chzzk-btn-group">
                    <button id="btnConnectChzzk">연동 시작</button>
                    <button id="btnDisconnectChzzk" style="display:none; background:#be123c; border:none; color:white; box-shadow:0 4px 12px rgba(190,18,60,0.2);">연동 종료</button>
                </div>
                <div class="status-indicator">
                    상태: <span id="chzzkStatus" style="color:#ef4444;">연결 끊김 🔴</span>
                </div>
                
                <div id="chzzkLog" class="chzzk-log">채널 주소나 ID를 입력하고 [연동 시작]을 누르면 즉시 채팅이 게임에 연동됩니다.</div>
                <button id="btnCloseChzzkUI" class="close-btn">닫기</button>
            </div>
            
            <!-- 상점 오버레이 UI -->
            <div id="shopUI">
                <h3>⚙️ ARCADE SHOP (<span id="shopGoldDisplay">0</span>G)</h3>
                <div id="shopItemsContainer"></div>
                <button id="btnHealFull">
                    <span>❤️ 전체 체력 회복</span>
                    <span class="shop-cost-tag">100G</span>
                </button>
                <button id="btnReroll">🔄 상품 리롤 (50G)</button>
            </div>

            <!-- 게임오버 스크린 -->
            <div id="gameOverScreen">
                <h2>GAME OVER</h2>
                <div class="go-card">
                    <p>도달한 라운드: <strong id="goRound" style="color: #38bdf8;">1</strong></p>
                    <p>처치한 적: <strong id="goKills" style="color: #eab308;">0</strong></p>
                </div>
                <button onclick="restartGame()">재도전</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 안전한 사운드 이펙트 (Lazy Initialization)
        // ==========================================
        let audioCtx = null;

        const sfx = {
            init: function() {
                if (!audioCtx) {
                    try {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        audioCtx = new AudioContext();
                    } catch (e) {
                        console.warn("Web Audio API not supported.", e);
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(e => {});
                }
            },
            playTone: function(freq, type, duration, vol, slide) {
                try {
                    sfx.init();
                    if (!audioCtx) return;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    if (slide) {
                        osc.frequency.exponentialRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
                    }
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                } catch(e) {}
            },
            playNoise: function(duration, vol) {
                try {
                    sfx.init();
                    if (!audioCtx) return;
                    const bufferSize = audioCtx.sampleRate * duration;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    const gain = audioCtx.createGain();
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 1000;
                    
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(audioCtx.destination);
                    noise.start();
                } catch(e) {}
            },

            let maxArchIdx = 2; // 1~2라운드: RANGED, DASHER, TANK 위주

            if (roundLevel > 3 && randVal2 > 0.35) {

            }
            if (modIdx >= ENEMY_MODIFIERS.length) modIdx = 0;
            let mod = ENEMY_MODIFIERS[modIdx];
            
            let hpMult = (1 + (roundLevel * 0.15)) * mod.hpMult;
            let finalHp = Math.floor(arch.hp * hpMult);
            let finalColor = mod.color || arch.color;
            let scale = mod.scale || 1.0;
            
            let finalW = Math.floor(arch.w * scale);
            let finalH = Math.floor(arch.h * scale);
            let name = mod.prefix ? `${mod.prefix} ${arch.name}` : arch.name;
            
            return {
                chunkKey: chunkKey,
                isBoss: false,
                spawnX: px,
                x: px,
                y: py - finalH,
                w: finalW,
                h: finalH,
                hp: finalHp,
                maxHp: finalHp,

        function generateChunk(cx, cy, baseSeed) {
            let chunkKey = cx + "," + cy;
            if (activeChunks.has(chunkKey)) return;
            activeChunks.add(chunkKey);

            let s = baseSeed + cx * 374761393 + cy * 668265263;
            let startX = cx * CHUNK_W;
            let startY = cy * CHUNK_H;
            let roundLevel = Math.max(1, cy + 1); 
            let isSecretArea = (cy < 0);
            let isBossRound = (!isSecretArea && roundLevel % 5 === 0);
            
            // 구조적 그리드 기반 발판 생성
            let rows = 8;
            let cols = 4;
            let cellW = CHUNK_W / cols; // 300px
            let cellH = (CHUNK_H - 300) / rows; // 1300 / 8 = 162.5px
            
            for (let r = 0; r < rows; r++) {
                // 한 층에 적어도 2개 이상의 발판은 생성하여 밟고 갈 곳을 만듬
                let activeCols = [];
                let pCount = 2 + Math.floor(seededRandom(s++) * 2); // 2~3개 열 선택
                while (activeCols.length < pCount) {
                    let colIdx = Math.floor(seededRandom(s++) * cols);
                    if (!activeCols.includes(colIdx)) activeCols.push(colIdx);
                }
                
                for (let c of activeCols) {
                    let typeRand = seededRandom(s++);
                    let pw, ph, px, py;
                    
                    let cellX = startX + c * cellW;
                    let cellY = startY + 150 + r * cellH;
                    
                    if (typeRand < 0.60) {
                        // 1) 일반 가로 발판
                        pw = 100 + Math.floor(seededRandom(s++) * 120); // 100 ~ 220
                        ph = 18;
                        px = cellX + Math.floor(seededRandom(s++) * (cellW - pw));
                        py = cellY + Math.floor(seededRandom(s++) * (cellH - 40));
                        
                        platforms.push({ chunkKey: chunkKey, x: px, y: py, w: pw, h: ph, isRoundFloor: false, isOneWay: false });
                        
                        // 미적 기둥 장식 (발판 밑을 받치는 얇은 하이테크 기둥)
                        if (seededRandom(s++) > 0.6) {
                            let pillarW = 8;
                            let pillarH = 60 + Math.floor(seededRandom(s++) * 60);
                            let pillarX = px + (seededRandom(s++) > 0.5 ? 10 : pw - 18);
                            platforms.push({ chunkKey: chunkKey, x: pillarX, y: py + ph, w: pillarW, h: pillarH, isRoundFloor: false, isOneWay: false });
                        }
                    } else if (typeRand < 0.85) {
                        // 2) 일방통행(One-way) 얇은 홀로그램 발판
                        pw = 90 + Math.floor(seededRandom(s++) * 90); // 90 ~ 180
                        ph = 14;
                        px = cellX + Math.floor(seededRandom(s++) * (cellW - pw));
                        py = cellY + Math.floor(seededRandom(s++) * (cellH - 40));
                        
                        platforms.push({ chunkKey: chunkKey, x: px, y: py, w: pw, h: ph, isRoundFloor: false, isOneWay: true, isLocked: false });
                    } else {
                        // 3) 계단형 발판 브릿지 (2단)
                        let stepW = 70;
                        pw = stepW * 2;
                        ph = 16;
                        px = cellX + Math.floor(seededRandom(s++) * (cellW - pw - 20));
                        py = cellY + 40;
                        
                        let dir = seededRandom(s++) > 0.5 ? 1 : -1;
                        for (let step = 0; step < 2; step++) {
                            let stepX = px + (step * stepW);
                            let stepY = py + (dir * step * 35);
                            platforms.push({ chunkKey: chunkKey, x: stepX, y: stepY, w: stepW, h: ph, isRoundFloor: false, isOneWay: false });
                        }
                        pw = stepW;
                        py = py + 35;
                    }

                    let isSafeZone = (cx === 0 && cy === 0 && px < 1200 && py < 1000);

                    // 몬스터 배치 (발판 위에 생성)
                    if (!isSafeZone && !isSecretArea && seededRandom(s++) > 0.35) { 
                        let rand1 = seededRandom(s++);
                        let rand2 = seededRandom(s++);
                        let spawnX = px + (pw / 2);
                        enemies.push(createProceduralEnemy(chunkKey, spawnX, py, roundLevel, rand1, rand2));
                    }

                    // 아이템 박스 배치
                    let boxChance = isSecretArea ? 0.90 : 0.93; 
                    if (seededRandom(s++) > boxChance) {
                        let randType = seededRandom(s++);
                        let itemType = randType < 0.33 ? "UPGRADE_RAPID" : (randType < 0.66 ? "UPGRADE_SPREAD" : "UPGRADE_POWER");
                        let itemColor = itemType === "UPGRADE_RAPID" ? "#38bdf8" : (itemType === "UPGRADE_SPREAD" ? "#4ade80" : "#f87171");
                        
                        if (isSecretArea && randType < 0.1) { 
                            itemType = "SPEC_HP"; itemColor = "#a855f7";
                        }
                        items.push({ chunkKey: chunkKey, x: px + (pw / 2) - 10, y: py - 20, w: 20, h: 20, type: itemType, picked: false, color: itemColor });
                    }
                }
            }

            if (!isSecretArea) {
                let floorY = startY + CHUNK_H;
                let gateWidth = 200 + Math.floor(seededRandom(s++) * 100); 
                let gateCenter = startX + 200 + Math.floor(seededRandom(s++) * (CHUNK_W - 400));
                
                let leftFloorWidth = (gateCenter - gateWidth/2) - startX;
                let rightFloorStartX = gateCenter + gateWidth/2;
                let rightFloorWidth = (startX + CHUNK_W) - rightFloorStartX;

                platforms.push({ chunkKey: chunkKey, x: startX, y: floorY, w: leftFloorWidth, h: 40, isRoundFloor: true, isOneWay: false });
                platforms.push({ chunkKey: chunkKey, x: rightFloorStartX, y: floorY, w: rightFloorWidth, h: 40, isRoundFloor: true, isOneWay: false });
                platforms.push({ chunkKey: chunkKey, x: gateCenter - gateWidth/2, y: floorY, w: gateWidth, h: 10, isRoundFloor: true, isOneWay: true, isLocked: isBossRound });

                if (isBossRound) {
                    let rand1 = seededRandom(s++);
                    let rand2 = seededRandom(s++);
                    enemies.push(createProceduralBoss(chunkKey, gateCenter, floorY, roundLevel, rand1, rand2));
                }

                if (seededRandom(s++) > 0.70 && (leftFloorWidth > 100 || rightFloorWidth > 100)) {
                    let shopX = (leftFloorWidth > rightFloorWidth) ? startX + leftFloorWidth / 2 - 40 : rightFloorStartX + rightFloorWidth / 2 - 40;
                    shops.push({
                        chunkKey: chunkKey,
                        x: shopX, y: floorY - 60, w: 80, h: 60,
                        items: generateShopItemsSeeded(s),
                        rerollCost: 50
                    });
                }
            }
        }

        function updateChunks() {
            let pcx = Math.floor(player.x / CHUNK_W);
            let pcy = Math.floor(player.y / CHUNK_H);

            let requiredChunks = new Set();
            for (let cx = pcx - 1; cx <= pcx + 1; cx++) {
                for (let cy = pcy - 1; cy <= pcy + 1; cy++) {
                    requiredChunks.add(cx + "," + cy);
                    generateChunk(cx, cy, currentSeed);
                }
            }

            for (let key of activeChunks) {
                if (!requiredChunks.has(key) && key !== "init") {
                    platforms = platforms.filter(p => p.chunkKey !== key);
                    enemies = enemies.filter(e => e.chunkKey !== key);
                    items = items.filter(i => i.chunkKey !== key);
                    drops = drops.filter(d => d.chunkKey !== key);
                    shops = shops.filter(s => {
                        if (s.chunkKey === key && currentShop === s) closeShopUI();
                        return s.chunkKey !== key;
                    });
                    activeChunks.delete(key);
                }
            }
        }

        function initLevel(seed) {
            // 시작 및 재도전 시 3개의 캐릭터 중 무작위로 결정
            currentCharIndex = Math.floor(Math.random() * characters.length);

            platforms = []; enemies = []; bullets = []; enemyBullets = []; items = []; particles = []; shops = []; drops = [];
            activeChunks.clear();
            closeShopUI();
            
            initParallaxStars();
            damageTexts = [];
            shakeTimer = 0;
            
            player.hp = characters[currentCharIndex].maxHp;
            player.maxHp = characters[currentCharIndex].maxHp;
            player.x = 0; player.y = 200; player.vx = 0; player.vy = 0;
            player.maxHoverGauge = 200;
            player.hoverGauge = 200;
            player.stats = { rapid: 0, spread: 0, power: 0, jump: 0, hover: 0, hpUp: 0, wallPierce: 0, homing: 0, magnet: 0, pierceUp: 0 };
            player.gold = 0; player.invulnerable = 0; player.flashTimer = 0;
            
            enemiesKilled = 0; gameActive = true;
            let goScreen = document.getElementById('gameOverScreen');
            goScreen.classList.remove('show');
            goScreen.style.display = 'none';

            cameraX = player.x - 960 / 2 + player.width / 2;
            cameraY = player.y - 480 / 2 + player.height / 2;

            platforms.push({ chunkKey: "init", x: -CHUNK_W*2, y: -CHUNK_H*2, w: CHUNK_W*4, h: 40, isRoundFloor: true, isOneWay: false });
            platforms.push({ chunkKey: "init", x: -200, y: 300, w: 400, h: 20, isRoundFloor: false, isOneWay: false });
            updateChunks();
        }

        function selectCharacter(index) {
            currentCharIndex = index;
            let btn0 = document.getElementById('btnChar0');
            let btn1 = document.getElementById('btnChar1');
            let btn2 = document.getElementById('btnChar2');
            if (btn0) btn0.className = index === 0 ? 'active' : '';
            if (btn1) btn1.className = index === 1 ? 'active' : '';
            if (btn2) btn2.className = index === 2 ? 'active' : '';
            initLevel(currentSeed);
        }

        function restartGame() {
            let newSeed = Math.floor(Math.random() * 99999);
            let mapSeedInput = document.getElementById('mapSeed');
            if (mapSeedInput) mapSeedInput.value = newSeed;
            currentSeed = newSeed;
            initLevel(currentSeed);
        }

        function applySeed() {
            let mapSeedInput = document.getElementById('mapSeed');
            if (mapSeedInput) {
                let seedVal = parseInt(mapSeedInput.value);
                if (!isNaN(seedVal)) {
                    currentSeed = seedVal;
                    initLevel(currentSeed);
                }
            }
        }

        function openShopUI(shop) {
            currentShop = shop;
            let el = document.getElementById('shopUI');
            el.style.display = 'flex';
            el.offsetHeight; // Force reflow
            el.classList.add('show');
            updateShopUI();
        }

        function closeShopUI() {
            currentShop = null;
            let el = document.getElementById('shopUI');
            el.classList.remove('show');
            setTimeout(() => {
                if (!currentShop && !el.classList.contains('show')) {
                    el.style.display = 'none';
                }
            }, 200);
        }

        function updateShopUI() {
            if (!currentShop) return;
            try {
                let goldDisp = document.getElementById('shopGoldDisplay');
                if (goldDisp) goldDisp.innerText = player.gold;
                
                let container = document.getElementById('shopItemsContainer');
                if (!container) return;
                container.innerHTML = '';
                
                if (currentShop.items && Array.isArray(currentShop.items)) {
                    currentShop.items.forEach((item, index) => {
                        let btn = document.createElement('button');
                        if (item.bought) {
                            btn.classList.add('bought');
                        } else {
                            btn.style.setProperty('--btn-color', item.color || '#6366f1');
                        }
                        
                        let title = document.createElement('span');
                        title.innerText = item.name || "Unknown";
                        title.style.fontSize = "13px";
                        
                        let cost = document.createElement('span');
                        cost.className = 'shop-cost-tag';
                        let costData = upgradeCostMap[item.type] || { base: 40, inc: 15, stat: "rapid" };
                        let currentLvl = (player.stats && player.stats[costData.stat]) ? player.stats[costData.stat] : 0;
                        let dynamicCost = costData.base + (currentLvl * costData.inc);

                        cost.innerText = item.bought ? "SOLD" : dynamicCost + "G";
                        
                        btn.appendChild(title);
                        btn.appendChild(cost);
                        
                        btn.disabled = item.bought || player.gold < dynamicCost;
                        btn.onclick = () => {
                            if (!item.bought && player.gold >= dynamicCost) {
                                player.gold -= dynamicCost;
                                item.bought = true;
                                applyUpgrade(item.type);
                                spawnParticles(player.x + player.width/2, player.y + player.height/2, item.color, 20);
                                updateShopUI(); 
                            }
                        };
                        container.appendChild(btn);
                    });
                }

                let healBtn = document.getElementById('btnHealFull');
                if (healBtn) {
                    healBtn.disabled = player.gold < 100 || player.hp >= player.maxHp;
                    healBtn.onclick = () => {
                        if (player.gold >= 100 && player.hp < player.maxHp) {
                            player.gold -= 100;
                            player.hp = player.maxHp;
                            sfx.upgrade();
                            spawnParticles(player.x + player.width/2, player.y + player.height/2, "#10b981", 25);
                            updateShopUI();
                        }
                    };
                }
                
                let rrBtn = document.getElementById('btnReroll');
                if (rrBtn) {
                    rrBtn.innerText = `🔄 리롤 (${currentShop.rerollCost}G)`;
                    rrBtn.disabled = player.gold < currentShop.rerollCost;
                    rrBtn.onclick = () => {
                        if(player.gold >= currentShop.rerollCost) {
                            player.gold -= currentShop.rerollCost;
                            currentShop.rerollCost *= 2; 
                            currentShop.items = generateShopItemsRandomly();
                            sfx.upgrade();
                            updateShopUI();
                        }
                    };
                }
            } catch(e) {
                console.error("Shop UI Error: ", e);
            }
        }

        function applyUpgrade(type) {
            sfx.upgrade();
            if (type === "UPGRADE_RAPID") player.stats.rapid++;
            if (type === "UPGRADE_SPREAD") player.stats.spread++;
            if (type === "UPGRADE_POWER") player.stats.power++;
            if (type === "SPEC_JUMP") player.stats.jump++;
            if (type === "SPEC_HOVER") {
                player.stats.hover++; player.maxHoverGauge += 100; player.hoverGauge += 100;
            }
            if (type === "SPEC_HP") {
                player.stats.hpUp++; player.maxHp += 20; player.hp += 20; 
            }
            if (type === "SPEC_WALL_PIERCE") player.stats.wallPierce++;
            if (type === "SPEC_HOMING") player.stats.homing++;
            if (type === "SPEC_MAGNET") player.stats.magnet++;
            if (type === "SPEC_PIERCE_UP") player.stats.pierceUp++;
        }

        window.addEventListener('keydown', (e) => {
            sfx.init(); 
            if (e.key.toLowerCase() === 'a') keys.a = true;
            if (e.key.toLowerCase() === 'd') keys.d = true;
            if (e.key.toLowerCase() === 'w') keys.w = true;
            if (e.key.toLowerCase() === 's') keys.s = true;
            if (e.code === 'Space') { keys.space = true; e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'a') keys.a = false;
            if (e.key.toLowerCase() === 'd') keys.d = false;
            if (e.key.toLowerCase() === 'w') keys.w = false;
            if (e.key.toLowerCase() === 's') keys.s = false;
            if (e.code === 'Space') keys.space = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.clientX - rect.left) * (960 / rect.width);
            mouse.y = (e.clientY - rect.top) * (480 / rect.height);
        });
        canvas.addEventListener('mousedown', (e) => { 
            sfx.init();
            if (e.button === 0) mouse.isDown = true; 
        });
        canvas.addEventListener('mouseup', (e) => { if (e.button === 0) mouse.isDown = false; });

        function getTouchPos(t) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (t.clientX - rect.left) * (960 / rect.width),
                y: (t.clientY - rect.top) * (480 / rect.height)
            };
        }

        canvas.addEventListener('touchstart', (e) => {
            sfx.init();
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return; 
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                let pos = getTouchPos(t);

                if (pos.x < 960 / 2 && !joysticks.left.active) {
                    joysticks.left.active = true;
                    joysticks.left.id = t.identifier;
                    joysticks.left.originX = pos.x; joysticks.left.originY = pos.y;
                    joysticks.left.x = pos.x; joysticks.left.y = pos.y;
                } else if (pos.x >= 960 / 2 && !joysticks.right.active) {
                    joysticks.right.active = true;
                    joysticks.right.id = t.identifier;
                    joysticks.right.originX = pos.x; joysticks.right.originY = pos.y;
                    joysticks.right.x = pos.x; joysticks.right.y = pos.y;
                }
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                let pos = getTouchPos(t);
                if (joysticks.left.active && t.identifier === joysticks.left.id) {
                    joysticks.left.x = pos.x; joysticks.left.y = pos.y;
                } else if (joysticks.right.active && t.identifier === joysticks.right.id) {
                    joysticks.right.x = pos.x; joysticks.right.y = pos.y;
                }
            }
        }, {passive: false});

        function handleTouchEnd(e) {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (joysticks.left.active && t.identifier === joysticks.left.id) joysticks.left.active = false;
                else if (joysticks.right.active && t.identifier === joysticks.right.id) joysticks.right.active = false;
            }
        }
        canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
        canvas.addEventListener('touchcancel', handleTouchEnd, {passive: false});

        function triggerGameOver() {
            gameActive = false;
            let currentRound = Math.max(1, Math.floor(player.y / CHUNK_H) + 1);
            document.getElementById('goRound').innerText = currentRound;
            document.getElementById('goKills').innerText = enemiesKilled;
            let el = document.getElementById('gameOverScreen');
            el.style.display = 'flex';
            el.offsetHeight; // Force reflow
            el.classList.add('show');
        }

        function takeDamage(amount) {
            if (player.invulnerable <= 0) {
                player.hp -= amount;
                player.invulnerable = 60; 
                player.flashTimer = 8; 
                triggerScreenShake(7, 15); 
                sfx.damage();
                spawnFloatingText(player.x + player.width/2, player.y - 10, `-${amount}`, "#ef4444");
                spawnParticles(player.x + player.width/2, player.y + player.height/2, "#ef4444", 15);
                if (player.hp <= 0) triggerGameOver();
            }
        }

        function getMouseAngle(sourceX, sourceY) {
            let worldMouseX = mouse.x + cameraX;
            let worldMouseY = mouse.y + cameraY;
            return Math.atan2(worldMouseY - sourceY, worldMouseX - sourceX);
        }

        function shoot() {
            if (player.shootCooldown > 0) return;

            let pCenterX = player.x + player.width / 2;
            let pCenterY = player.y + player.height / 2;
            let angle = currentAimAngle; 
            let charData = characters[currentCharIndex];

            let cooldown = charData.baseCooldown - (player.stats.rapid * 2);
            if (cooldown < 16) cooldown = 16;
            player.shootCooldown = cooldown;
            sfx.shoot();

            let totalBullets = 1 + charData.baseSpread + player.stats.spread;
            let spreadAngle = 0.15;
            let startAngle = angle - (totalBullets - 1) * spreadAngle / 2;

            let dmg = charData.baseDamage + (player.stats.power * 4);
            let radius = 4 + (player.stats.power * 0.5);
            let speed = 7 + (player.stats.rapid * 0.25); 

            for (let i = 0; i < totalBullets; i++) {
                let pLeft = (charData.isPierce ? 1 : 0) + (player.stats.pierceUp || 0);
                let bType = (pLeft > 0) ? "PIERCE" : "NORMAL";
                createBullet(bullets, pCenterX, pCenterY, startAngle + (i * spreadAngle), bType, speed, charData.color, true, dmg, radius, pLeft);
            }
        }

        function createBullet(targetArray, x, y, angle, type, speed, color, isPlayer, damage = 10, radius = 4, pierceLeft = 0) {
            targetArray.push({
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: radius, color: color,
                type: type, life: 100, isPlayer: isPlayer, damage: damage,
                hitSet: new Set(),
                pierceLeft: pierceLeft
            });
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        function spawnParticles(x, y, color, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 20 + Math.random() * 20,
                    color: color
                });
            }
        }

        function update() {
            if (!gameActive) return;

            updateChunks();

            let pRect = {x: player.x, y: player.y, w: player.width, h: player.height};

            let overlappingShop = null;
            for (let s of shops) {
                if (checkCollision(pRect, s)) { overlappingShop = s; break; }
            }
            if (overlappingShop && currentShop !== overlappingShop) openShopUI(overlappingShop);
            else if (!overlappingShop && currentShop) closeShopUI();

            if (player.invulnerable > 0) player.invulnerable--;
            if (player.flashTimer > 0) player.flashTimer--;
            
            // 화상/빙결 디버프 처리
            if (player.burnTimer && player.burnTimer > 0) {
                player.burnTimer--;
                if (player.burnTimer % 30 === 0) {
                    takeDamage(2); // 도트 대미지 2
                    spawnParticles(player.x + player.width/2, player.y + player.height/2, "#f97316", 2);
                }
            }
            if (player.frostTimer && player.frostTimer > 0) {
                player.frostTimer--;
                if (Math.random() > 0.8) spawnParticles(player.x + player.width/2, player.y + player.height/2, "#60a5fa", 1);
            }
            
            // 플레이어 말풍선 수명 차감
            if (player.chatTimer && player.chatTimer > 0) {
                player.chatTimer--;
                if (player.chatTimer <= 0) player.chatText = null;
            }

            if (shakeTimer > 0) shakeTimer--;

            for (let i = damageTexts.length - 1; i >= 0; i--) {
                let t = damageTexts[i];
                t.y += t.vy; t.life--; t.alpha = t.life / 55;
                if (t.life <= 0) damageTexts.splice(i, 1);
            }

            let isMoveLeft = keys.a;
            let isMoveRight = keys.d;
            let isMoveDown = keys.s; 
            let isJumpKeyPressed = keys.w || keys.space;
            let isShooting = mouse.isDown;
            let pCenterX = player.x + player.width / 2;
            let pCenterY = player.y + player.height / 2;

            if (joysticks.left.active) {
                let dx = joysticks.left.x - joysticks.left.originX;
                let dy = joysticks.left.y - joysticks.left.originY;
                let dist = Math.hypot(dx, dy);
                if (dist > 60) {
                    joysticks.left.x = joysticks.left.originX + (dx / dist) * 60;
                    joysticks.left.y = joysticks.left.originY + (dy / dist) * 60;
                }
                if (dx < -20) isMoveLeft = true;
                if (dx > 20) isMoveRight = true;
                if (dy < -30) isJumpKeyPressed = true;
                if (dy > 30) isMoveDown = true; 
            }

            if (joysticks.right.active) {
                let dx = joysticks.right.x - joysticks.right.originX;
                let dy = joysticks.right.y - joysticks.right.originY;
                let dist = Math.hypot(dx, dy);
                if (dist > 60) {
                    joysticks.right.x = joysticks.right.originX + (dx / dist) * 60;
                    joysticks.right.y = joysticks.right.originY + (dy / dist) * 60;
                }
                if (dist > 15) { currentAimAngle = Math.atan2(dy, dx); isShooting = true; }
            } else {
                currentAimAngle = getMouseAngle(pCenterX, pCenterY);
            }

            let charSpeed = characters[currentCharIndex].speed;
            if (player.frostTimer && player.frostTimer > 0) charSpeed *= 0.55; // 둔화 시 이동속도 45% 감쇄
            
            if (isMoveLeft) player.vx = -charSpeed;
            else if (isMoveRight) player.vx = charSpeed;
            else player.vx *= 0.8;

            let actualJumpForce = characters[currentCharIndex].jumpForce + (player.stats.jump * 1.0); 

            if (isJumpKeyPressed && player.grounded) {
                player.vy = -actualJumpForce; player.grounded = false; player.isHovering = false; sfx.jump();
            } else if (isJumpKeyPressed && !player.grounded && player.vy >= -3 && player.hoverGauge > 0) {
                player.vy = -1.8; player.isHovering = true; player.hoverGauge -= 1.5; 
                if (player.hoverGauge < 0) player.hoverGauge = 0;
                if (Math.random() > 0.5) spawnParticles(player.x + player.width/2, player.y + player.height, "#38bdf8", 1);
            } else {
                player.vy += GRAVITY; player.isHovering = false;
                if (player.vy > TERMINAL_VELOCITY) player.vy = TERMINAL_VELOCITY;
            }

            player.x += player.vx; pRect.x = player.x;
            let maxStep = player.height / 2; 

            for (let p of platforms) {
                if (p.isOneWay) continue; 
                if (checkCollision(pRect, p)) {
                    let pTop = p.y; let pBottomEdge = player.y + player.height;
                    if (player.grounded && player.vy >= 0 && pBottomEdge - pTop > 0 && pBottomEdge - pTop <= maxStep) {
                        player.y = pTop - player.height; pRect.y = player.y;
                    } else {
                        if (player.vx > 0) player.x = p.x - player.width;
                        if (player.vx < 0) player.x = p.x + p.w;
                        pRect.x = player.x;
                    }
                }
            }

            let activeBosses = new Set();
            for (let e of enemies) {
                if (e.isBoss && !e.dead) activeBosses.add(e.chunkKey);
            }
            for (let p of platforms) {
                if (p.isOneWay && p.isLocked) {
                    if (!activeBosses.has(p.chunkKey)) { p.isLocked = false; spawnParticles(p.x + p.w/2, p.y, "#38bdf8", 30); sfx.upgrade(); }
                }
            }

            let prevBottom = player.y - player.vy + player.height;
            player.y += player.vy; player.grounded = false; pRect.y = player.y;

            for (let p of platforms) {
                if (checkCollision(pRect, p)) {
                    if (p.isOneWay) {
                        if (player.vy > 0 && prevBottom <= p.y + 15) {
                            if (isMoveDown && !p.isLocked) { } 
                            else {
                                player.y = p.y - player.height; player.vy = 0; player.grounded = true; player.hoverGauge += 10;
                                if (player.hoverGauge > player.maxHoverGauge) player.hoverGauge = player.maxHoverGauge;
                            }
                        }
                    } else {
                        if (player.vy > 0) {
                            player.y = p.y - player.height; player.vy = 0; player.grounded = true; player.hoverGauge += 10;
                            if (player.hoverGauge > player.maxHoverGauge) player.hoverGauge = player.maxHoverGauge;
                        } else if (player.vy < 0) {
                            player.y = p.y + p.h; player.vy = 0;
                        }
                    }
                    pRect.y = player.y;
                }
            }

            if (player.shootCooldown > 0) player.shootCooldown--;
            if (isShooting && currentShop == null) shoot(); 

            let targetCameraX = player.x - 960 / 2 + player.width / 2;
            let targetCameraY = player.y - 480 / 2 + player.height / 2;
            cameraX += (targetCameraX - cameraX) * 0.1;
            cameraY += (targetCameraY - cameraY) * 0.1;

            // 투사체 처리
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                
                // 유도탄(Homing Bullet) 알고리즘 적용
                if (player.stats.homing && player.stats.homing > 0) {
                    let closestEnemy = null;
                    let minDist = 300; // 유도 범위 300px
                    for (let e of enemies) {
                        if (e.dead || e.isCloaked) continue; 
                        let edx = (e.x + e.w/2) - b.x;
                        let edy = (e.y + e.h/2) - b.y;
                        let edist = Math.sqrt(edx*edx + edy*edy);
                        if (edist < minDist) {
                            minDist = edist;
                            closestEnemy = e;
                        }
                    }
                    if (closestEnemy) {
                        let targetAngle = Math.atan2((closestEnemy.y + closestEnemy.h/2) - b.y, (closestEnemy.x + closestEnemy.w/2) - b.x);
                        let currentAngle = Math.atan2(b.vy, b.vx);
                        
                        let angleDiff = targetAngle - currentAngle;
                        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                        
                        let steerStrength = Math.min(0.02 + player.stats.homing * 0.02, 0.12);
                        let nextAngle = currentAngle + angleDiff * steerStrength;
                        
                        let speed = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
                        b.vx = Math.cos(nextAngle) * speed;
                        b.vy = Math.sin(nextAngle) * speed;
                    }
                }

                b.x += b.vx; b.y += b.vy; b.life--;

                let hitWall = false;
                if (player.stats.wallPierce === 0) {
                    for (let p of platforms) {
                        if (p.isOneWay) continue; 
                        if (checkCollision({x: b.x - b.radius, y: b.y - b.radius, w: b.radius*2, h: b.radius*2}, p)) { hitWall = true; break; }
                    }
                }
                if (hitWall) { spawnParticles(b.x, b.y, "#94a3b8", 3); bullets.splice(i, 1); continue; }

                let hitEnemy = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    if (e.dead || b.hitSet.has(e)) continue;
                    if (checkCollision({x: b.x - b.radius, y: b.y - b.radius, w: b.radius*2, h: b.radius*2}, e)) {
                        let finalDmg = e.modifier === "SHIELDED" ? Math.round(b.damage * 0.7) : b.damage;
                        e.hp -= finalDmg; 
                        b.hitSet.add(e);
                        e.flashTimer = 6; 
                        
                        spawnFloatingText(e.x + e.w/2, e.y - 5, finalDmg, e.isBoss ? "#facc15" : "#ffffff");
                        spawnParticles(b.x, b.y, b.color, 4); 
                        sfx.hit();
                        
                        // TELEPORTER 순간이동 로직
                        if ((e.type === "TELEPORTER" || e.modifier === "MIRAGE") && e.hp > 0) {
                            let available = platforms.filter(p => !p.isOneWay && Math.hypot(p.x - e.x, p.y - e.y) < 250);
                            if (available.length > 0) {
                                let targetP = available[Math.floor(Math.random() * available.length)];
                                spawnParticles(e.x + e.w/2, e.y + e.h/2, "#c084fc", 15);
                                e.x = targetP.x + Math.floor(Math.random() * (targetP.w - e.w));
                                e.y = targetP.y - e.h;
                                e.grounded = true;
                                spawnParticles(e.x + e.w/2, e.y + e.h/2, "#c084fc", 15);
                            }
                        }
                        
                        if (b.type === "PIERCE") {
                            b.pierceLeft--;
                            if (b.pierceLeft <= 0) hitEnemy = true;
                        } else {
                            hitEnemy = true;
                        }
                        if (e.hp <= 0) e.dead = true;
                        break;
                    }
                }
                if (hitEnemy || b.life <= 0) bullets.splice(i, 1);
            }

            // 적 AI 로직 루프
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (e.dead) continue;
                if (e.flashTimer > 0) e.flashTimer--;

                // 말풍선 수명 감소 처리
                if (e.chatTimer && e.chatTimer > 0) {
                    e.chatTimer--;
                    if (e.chatTimer <= 0) e.chatText = null;
                }

                let dx = (player.x + player.width/2) - (e.x + e.w/2);
                let dy = (player.y + player.height/2) - (e.y + e.h/2);
                let dist = Math.sqrt(dx*dx + dy*dy);

                // 은신(STEALTH) 감지 해제 (플레이어가 100px 이내로 오면 은신 풀림)
                if (e.isCloaked && dist < 100) {
                    e.isCloaked = false;
                    spawnParticles(e.x + e.w/2, e.y + e.h/2, "#cbd5e1", 5);
                    addSystemLog(`⚠️ 은신하고 있던 [${e.name}]를 발견했습니다!`);
                }

                // HEALER 사제형 특수 AI (주변 아군 치료)
                if (e.type === "HEALER" && !e.dead) {
                    if (e.healCooldown === undefined) e.healCooldown = 60;
                    e.healCooldown--;
                    if (e.healCooldown <= 0) {
                        let healTarget = null;
                        for (let other of enemies) {
                            if (other === e || other.dead) continue;
                            let otherDist = Math.hypot(e.x - other.x, e.y - other.y);
                            if (otherDist < 160 && other.hp < other.maxHp) {
                                healTarget = other;
                                break;
                            }
                        }
                        if (healTarget) {
                            healTarget.hp = Math.min(healTarget.maxHp, healTarget.hp + 12);
                            spawnParticles(healTarget.x + healTarget.w/2, healTarget.y + healTarget.h/2, "#22c55e", 6);
                            spawnFloatingText(healTarget.x + healTarget.w/2, healTarget.y - 5, "+12", "#22c55e");
                            e.healCooldown = 120; // 2초 주기
                        }
                    }
                }
                
                let aggroRange = e.isBoss ? 800 : 400;
                if (e.type === "FLYER") aggroRange = 300;
                else if (e.type === "TANK") aggroRange = 250;

                if (e.type !== "FLYER") {
                    e.vy += GRAVITY;
                    if (e.vy > TERMINAL_VELOCITY) e.vy = TERMINAL_VELOCITY;
                }

                if (e.state === "ROAM") {
                    let detectDy = (e.type === "RANGED" || e.type === "BOMBER" || e.isBoss) ? 600 : 200;
                    if (dist < aggroRange && (e.type === "FLYER" || Math.abs(dy) < detectDy)) { 
                        if (e.type === "DASHER" || e.type === "BOSS_DASHER") { e.state = "WINDUP"; e.timer = (e.type === "BOSS_DASHER") ? 20 : 30; e.vx = 0; } 
                        else { e.state = "HOSTILE"; e.timer = 0; }
                    } else {
                        e.roamTimer--;
                        if (e.roamTimer <= 0) { e.roamDir *= -1; e.roamTimer = 60 + Math.random() * 60; }
                        if (e.type === "FLYER") { e.vx = e.roamDir * 0.7; e.vy = Math.sin(e.roamTimer * 0.1) * 0.35; if (Math.abs(e.x - e.spawnX) > 150) e.roamDir *= -1; } 
                        else if (e.type === "TANK") e.vx = e.roamDir * 0.2; 
                        else e.vx = e.roamDir * 0.4; 

                        if (e.grounded && e.type !== "FLYER") {
                            let hasFloor = false; let checkX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2; let checkY = e.y + e.h + 2;
                            for (let p of platforms) { if (checkCollision({x: checkX, y: checkY, w: 1, h: 1}, p)) { hasFloor = true; break; } }
                            if (!hasFloor) { e.roamDir *= -1; e.vx = e.roamDir * (e.type === "TANK" ? 0.2 : 0.4); }
                        }
                    }
                } else if (e.state === "HOSTILE") {
                    if (dist > aggroRange + 150) { e.state = "ROAM"; } 
                    else {
                        e.timer++; let dirToPlayer = dx > 0 ? 1 : -1;
                        if (e.type === "TANK") {
                            e.vx = dirToPlayer * 0.3;
                            if (e.cooldown === undefined) e.cooldown = 0;
                            e.cooldown--;
                            if (dist < 55 && Math.abs(dy) < 40 && e.cooldown <= 0) {
                                e.state = "WINDUP";
                                e.timer = 18; // 0.3초 준비 시간
                                e.vx = 0;
                            }
                        }
                        else if (e.type === "FLYER") { let angle = Math.atan2(dy, dx); e.vx = Math.cos(angle) * 1.0; e.vy = Math.sin(angle) * 1.0; } 
                        else if (e.type.includes("RANGED") || e.type.includes("BOMBER")) {
                            let attackRange = e.type.includes("RANGED") ? 250 : 300;
                            if (dist < 150) e.vx = -dirToPlayer * 0.5;
                            else if (dist > attackRange) e.vx = dirToPlayer * 0.5;
                            else e.vx = Math.sin(e.timer * 0.05) * 0.6;

                            if (e.grounded) {
                                let hasFloor = false; let checkX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2; let checkY = e.y + e.h + 2;
                                for (let p of platforms) { if (checkCollision({x: checkX, y: checkY, w: 1, h: 1}, p)) { hasFloor = true; break; } }
                                if (!hasFloor && dist <= attackRange) e.vx = 0; 
                            }

                            e.cooldown--;
                            if (e.cooldown <= 0) {
                                let angle = Math.atan2(dy, dx);
                                if (e.type === "RANGED") {
                                    let bulletColor = "#f87171";
                                    if (e.modifier === "FIRE") bulletColor = "#f97316";
                                    else if (e.modifier === "FROST") bulletColor = "#60a5fa";
                                    
                                    createBullet(enemyBullets, e.x + e.w/2, e.y + e.h/2, angle, "NORMAL", 1.8, bulletColor, false, 10, 4);
                                    if (e.modifier === "FIRE" || e.modifier === "FROST") {
                                        enemyBullets[enemyBullets.length - 1].modifier = e.modifier;
                                    }
                                    e.cooldown = 110;
                                } else if (e.type === "BOSS_RANGED") {
                                    createBullet(enemyBullets, e.x + e.w/2, e.y + e.h/2, angle - 0.2, "NORMAL", 2.5, "#d8b4fe", false, 15, 6); 
                                    createBullet(enemyBullets, e.x + e.w/2, e.y + e.h/2, angle, "NORMAL", 2.5, "#d8b4fe", false, 15, 6); 
                                    createBullet(enemyBullets, e.x + e.w/2, e.y + e.h/2, angle + 0.2, "NORMAL", 2.5, "#d8b4fe", false, 15, 6); 
                                    e.cooldown = 50; 
                                } else if (e.type === "BOMBER") {
                                    let t = 60; let neededVx = dx / t; let neededVy = (dy - 0.5 * GRAVITY * t * t) / t; 
                                    neededVx = Math.min(Math.max(neededVx, -4.5), 4.5); neededVy = Math.min(Math.max(neededVy, -9), -1.5);
                                    
                                    let bombColor = "#84cc16";
                                    if (e.modifier === "FIRE") bombColor = "#f97316";
                                    else if (e.modifier === "FROST") bombColor = "#60a5fa";
                                    
                                    enemyBullets.push({ x: e.x + e.w/2, y: e.y, vx: neededVx, vy: neededVy, radius: 6, color: bombColor, type: "BOMB", life: 180, isPlayer: false, damage: 15, modifier: e.modifier });
                                    e.cooldown = 130;
                                } else if (e.type === "BOSS_BOMBER") {
                                    let t = 60; let neededVx = dx / t; let neededVy = (dy - 0.5 * GRAVITY * t * t) / t; 
                                    neededVx = Math.min(Math.max(neededVx, -6), 6); neededVy = Math.min(Math.max(neededVy, -10.5), -1.5);
                                    for(let bOffset = -1; bOffset <= 1; bOffset++) {
                                        enemyBullets.push({ x: e.x + e.w/2, y: e.y, vx: neededVx + bOffset * 1.5, vy: neededVy - Math.abs(bOffset) * 0.75, radius: 8, color: "#bef264", type: "BOMB", life: 240, isPlayer: false, damage: 20, modifier: e.modifier });
                                    }
                                    e.cooldown = 100;
                                }
                            }
                        }
                    }
                } else if (e.state === "WINDUP") {
                    e.timer--; e.vx = (e.timer % 4 < 2) ? 0.7 : -0.7;
                    if (e.timer <= 0) {
                        e.state = "DASHING";
                        let dirToPlayer = dx > 0 ? 1 : -1;
                        if (e.type === "TANK") {
                            e.vx = dirToPlayer * 3.8;
                            e.vy = -1.2; // 방패로 돌진 공격
                            e.timer = 15;
                        } else {
                            let t = (e.type === "BOSS_DASHER") ? 35 : 50; 
                            let neededVx = dx / t; 
                            let neededVy = (dy - 0.5 * GRAVITY * t * t) / t; 
                            if (e.type === "BOSS_DASHER") { e.vx = Math.min(Math.max(neededVx, -9), 9); e.vy = Math.min(Math.max(neededVy, -9), 2); e.timer = 50; } 
                            else { e.vx = Math.min(Math.max(neededVx, -5), 5); e.vy = Math.min(Math.max(neededVy, -7), 2); e.timer = 65; }
                        }
                        e.grounded = false;
                    }
                } else if (e.state === "DASHING") {
                    e.timer--; let peRect = {x: player.x, y: player.y, w: player.width, h: player.height};
                    if (checkCollision(peRect, e)) {
                        if (e.type === "TANK") {
                            takeDamage(14);
                            let pushDir = (player.x + player.width/2 > e.x + e.w/2) ? 1 : -1;
                            player.vx = pushDir * 6.5;
                            player.vy = -2.8;
                            spawnParticles(player.x + player.width/2, player.y + player.height/2, "#f59e0b", 10);
                            sfx.hit();
                            e.state = "COOLDOWN"; e.timer = 30; e.vx = 0; e.cooldown = 120;
                        } else {
                            takeDamage(e.type === "BOSS_DASHER" ? 25 : 15);
                        }
                    }
                    if (Math.random() > 0.5) spawnParticles(e.x + e.w/2, e.y + e.h, e.type === "TANK" ? "#cbd5e1" : "#fb923c", 1);
                    if (e.grounded || e.timer <= 0) { 
                        if (e.type === "TANK") {
                            e.state = "COOLDOWN"; e.timer = 30; e.vx = 0; e.cooldown = 100;
                        } else {
                            e.state = "COOLDOWN"; e.timer = 40; e.vx = 0; 
                        }
                    }
                } else if (e.state === "COOLDOWN") {
                    e.timer--; e.vx = 0; if (e.timer <= 0) e.state = "ROAM";
                }

                // 적들끼리 겹치는 것 방지 (Separation Force)
                let sepVx = 0;
                let sepVy = 0;
                let overlapCount = 0;
                let minDist = 24; // 적들의 너비/높이가 20~24 수준이므로 24px을 기준거리로 잡음
                for (let other of enemies) {
                    if (other === e || other.dead) continue;
                    let dx = (e.x + e.w/2) - (other.x + other.w/2);
                    let dy = (e.y + e.h/2) - (other.y + other.h/2);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < minDist && dist > 0) {
                        let force = (minDist - dist) / minDist; // 가까울수록 강한 밀어내기 힘 (0~1)
                        // 지상 몬스터는 X축 위주로 밀어냄. 공중 몬스터끼리는 X/Y 모두 밀어냄.
                        sepVx += (dx / dist) * force * 1.5; 
                        if (e.type === "FLYER" && other.type === "FLYER") {
                            sepVy += (dy / dist) * force * 1.5;
                        }
                        overlapCount++;
                    } else if (dist === 0) {
                        // 완전히 동일 좌표에 겹쳐 있는 특수 상황 시 랜덤하게 벌어지도록 처리
                        sepVx += (Math.random() - 0.5) * 1.5;
                        if (e.type === "FLYER") {
                            sepVy += (Math.random() - 0.5) * 1.5;
                        }
                        overlapCount++;
                    }
                }
                if (overlapCount > 0) {
                    e.vx += sepVx;
                    if (e.type === "FLYER") {
                        e.vy += sepVy;
                    }
                }

                // 광포화(FRENZY) 및 속도 배율 보정 적용
                let finalVx = e.vx * (e.speedMult || 1.0);
                let finalVy = e.vy;

                if (e.type !== "FLYER" && e.modifier !== "SHADOW") {
                    e.x += finalVx;
                    for (let p of platforms) {
                        if (p.isOneWay) continue; 
                        if (checkCollision({x: e.x, y: e.y, w: e.w, h: e.h}, p)) {
                            if (finalVx > 0) e.x = p.x - e.w; if (finalVx < 0) e.x = p.x + p.w; if (e.state === "ROAM") e.roamDir *= -1;
                        }
                    }
                    e.y += finalVy; e.grounded = false;
                    for (let p of platforms) {
                        if (checkCollision({x: e.x, y: e.y, w: e.w, h: e.h}, p)) {
                            if (p.isOneWay) { if (finalVy > 0 && (e.y - finalVy + e.h <= p.y + 15)) { e.y = p.y - e.h; e.vy = 0; e.grounded = true; } } 
                            else { if (finalVy > 0) { e.y = p.y - e.h; e.vy = 0; e.grounded = true; } else if (finalVy < 0) { e.y = p.y + p.h; e.vy = 0; } }
                        }
                    }
                } else { 
                    e.x += finalVx; 
                    e.y += finalVy; 
                }

                // 일반 접촉 대미지 판정 (대시 공격 중이 아닐 때 기본적인 몸싸움 판정)
                let contactRect = {x: e.x, y: e.y, w: e.w, h: e.h};
                let peRect = {x: player.x, y: player.y, w: player.width, h: player.height};
                if (checkCollision(peRect, contactRect) && e.state !== "DASHING") {
                    let contactDmg = 0;
                    if (e.type === "FLYER") contactDmg = 6;
                    else if (e.type === "SPLITTER") contactDmg = 5;
                    else if (e.type === "TANK") contactDmg = 4;
                    else if (e.type === "DASHER") contactDmg = 4;
                    else if (e.isBoss) contactDmg = 15;
                    else contactDmg = 3;
                    
                    if (contactDmg > 0) {
                        takeDamage(contactDmg);
                    }
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let b = enemyBullets[i];
                if (b.type === "BOMB") b.vy += GRAVITY;
                b.x += b.vx; b.y += b.vy; b.life--;
                
                let hitWall = false;
                for (let p of platforms) {
                    if (p.isOneWay) continue;
                    if (checkCollision({x: b.x - b.radius, y: b.y - b.radius, w: b.radius*2, h: b.radius*2}, p)) { hitWall = true; break; }
                }
                if (hitWall) {
                    if (b.type === "BOMB") { sfx.explosion(); spawnParticles(b.x, b.y, "#84cc16", 15); triggerScreenShake(5, 10); } 
                    else spawnParticles(b.x, b.y, "#94a3b8", 3);
                    enemyBullets.splice(i, 1); continue;
                }
                let bRect = {x: b.x - b.radius, y: b.y - b.radius, w: b.radius*2, h: b.radius*2};
                if (checkCollision(pRect, bRect)) { 
                    takeDamage(b.damage || 10); 
                    
                    // 특수 탄환 디버프 연동
                    if (b.modifier === "FIRE") {
                        player.burnTimer = 180; // 3초간 화상
                    } else if (b.modifier === "FROST") {
                        player.frostTimer = 180; // 3초간 빙결 둔화
                    }
                    enemyBullets.splice(i, 1); 
                    continue; 
                }
                if (b.life <= 0) enemyBullets.splice(i, 1);
            }

            for (let i = drops.length - 1; i >= 0; i--) {
                let d = drops[i]; 
                
                if (d.type === "TOXIC_CLOUD") {
                    d.life--;
                    if (checkCollision(pRect, d)) {
                        takeDamage(0.15); // 도트 대미지
                        if (Math.random() > 0.8) spawnParticles(player.x + player.width/2, player.y + player.height/2, "#22c55e", 1);
                    }
                    if (d.life <= 0) drops.splice(i, 1);
                    continue;
                }
                
                // 플레이어 유도 (자석) 알고리즘 적용
