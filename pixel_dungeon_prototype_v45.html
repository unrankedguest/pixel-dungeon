                let dx = (player.x + player.width/2) - (d.x + d.w/2);
                let dy = (player.y + player.height/2) - (d.y + d.h/2);
                let dist = Math.sqrt(dx*dx + dy*dy);
                let magnetRange = 30 + (player.stats.magnet * 50);
                if (dist < magnetRange) {
                    let pullForce = 0.28;
                    let angle = Math.atan2(dy, dx);
                    d.vx += Math.cos(angle) * pullForce;
                    d.vy += Math.sin(angle) * pullForce;
                    d.vx *= 0.88;
                    d.vy *= 0.88;
                } else {
                    d.vy += GRAVITY;
                    if (d.vy > TERMINAL_VELOCITY) d.vy = TERMINAL_VELOCITY;
                }
                d.x += d.vx;
                for (let p of platforms) { if (p.isOneWay) continue; if (checkCollision(d, p)) { d.x -= d.vx; d.vx *= -0.5; break; } }
                d.y += d.vy;
                for (let p of platforms) {
                    if (checkCollision(d, p)) {
                        if (p.isOneWay) { if (d.vy > 0 && d.y - d.vy + d.h <= p.y + 15) { d.y = p.y - d.h; d.vy *= -0.4; d.vx *= 0.8; } } 
                        else { if (d.vy > 0) { d.y = p.y - d.h; d.vy *= -0.4; d.vx *= 0.8; } else if (d.vy < 0) { d.y = p.y + p.h; d.vy *= -0.5; } }
                    }
                }
                d.life--;
                if (checkCollision(pRect, d)) { player.gold += d.amount; sfx.coin(); spawnParticles(d.x, d.y, "#fbbf24", 5); if (currentShop) updateShopUI(); drops.splice(i, 1); continue; }
                if (d.life <= 0 || d.y > player.y + 1000) drops.splice(i, 1);
            }

            for (let item of items) {
                if (!item.picked && checkCollision(pRect, item)) { item.picked = true; applyUpgrade(item.type); spawnParticles(item.x + 10, item.y + 10, item.color, 20); }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life--; if (p.life <= 0) particles.splice(i, 1);
            }

            let goldGained = false;
            for (let i = enemies.length - 1; i >= 0; i--) {
                if (enemies[i].dead) {
                    let e = enemies[i]; 
                    sfx.explosion(); 
                    triggerScreenShake(e.isBoss ? 12 : 3, e.isBoss ? 24 : 8);
                    spawnParticles(e.x + e.w/2, e.y + e.h/2, e.color, e.isBoss ? 50 : 15);
                    
                    // 특수 접두사/원형 사망 효과 처리
                    if (e.modifier === "EXPLOSIVE") {
                        triggerScreenShake(8, 15);
                        spawnParticles(e.x + e.w/2, e.y + e.h/2, "#f59e0b", 35);
                        let pDist = Math.hypot((player.x + player.width/2) - (e.x + e.w/2), (player.y + player.height/2) - (e.y + e.h/2));
                        if (pDist < 100) {
                            takeDamage(20);
                            addSystemLog("💥 몬스터의 자폭에 휘말렸습니다! (-20)");
                        }
                    } else if (e.modifier === "TOXIC") {
                        drops.push({
                            chunkKey: e.chunkKey,
                            x: e.x - 20, y: e.y - 10,
                            vx: 0, vy: 0,
                            w: 50, h: 25,
                            amount: 0,
                            life: 240, // 4초 유지
                            color: "rgba(34, 197, 94, 0.35)",
                            type: "TOXIC_CLOUD"
                        });
                    } else if (e.type === "SPLITTER" && !e.isChild) {
                        for (let splitDir of [-1, 1]) {
                            enemies.push({
                                chunkKey: e.chunkKey, isBoss: false,
                                spawnX: e.x + e.w/2,
                                x: e.x + e.w/2 - 7, y: e.y + e.h - 12,
                                w: 14, h: 12,
                                hp: 18, maxHp: 18,
                                type: "SPLITTER",
                                modifier: "NORMAL",
                                name: "분열된 슬라임",
                                color: e.color,
                                cooldown: 40,
                                state: "ROAM",
                                timer: 0,
                                vx: splitDir * (1.5 + Math.random() * 1.5),
                                vy: -2.5 - Math.random() * 2,
                                grounded: false,
                                roamDir: splitDir,
                                roamTimer: 30 + Math.floor(Math.random() * 30),
                                dead: false,
                                flashTimer: 0,
                                speedMult: 1.1,
                                isChild: true
                            });
                        }
                        spawnParticles(e.x + e.w/2, e.y + e.h/2, "#22c55e", 10);
                    }
                    
                    let totalGold = 10;
                    if (e.isBoss) totalGold = 100; 
                    else if (e.type === "TANK") totalGold = 25; 
                    else if (e.type === "DASHER") totalGold = 15; 
                    else if (e.type === "BOMBER") totalGold = 12;
                    else if (e.type === "HEALER") totalGold = 18;
                    else if (e.type === "TELEPORTER") totalGold = 20;
                    else if (e.type === "SPLITTER") totalGold = 16;
                    
                    let numSmallCoins = e.isBoss ? 8 : (Math.floor(Math.random() * 2) + 2); 
                    let bigGoldValue = totalGold - numSmallCoins;
                    if (bigGoldValue < 1) bigGoldValue = 1;
                    
                    drops.push({ chunkKey: e.chunkKey, x: e.x + e.w/2 - 6, y: e.y + e.h/2 - 6, vx: (Math.random() - 0.5) * 2, vy: -1.5 - Math.random() * 1.5, w: 12, h: 12, amount: bigGoldValue, life: 600, color: "#f59e0b" });
                    for (let k = 0; k < numSmallCoins; k++) {
                        drops.push({ chunkKey: e.chunkKey, x: e.x + e.w/2 - 3, y: e.y + e.h/2 - 3, vx: (Math.random() - 0.5) * 8, vy: -3 - Math.random() * 4, w: 6, h: 6, amount: 1, life: 600, color: "#fcd34d" });
                    }
                    if (e.isBoss) items.push({ chunkKey: e.chunkKey, x: e.x, y: e.y, w: 20, h: 20, type: "SPEC_HP", picked: false, color: "#a855f7" });
                    enemiesKilled++; 
                    enemies.splice(i, 1);
                }
            }
        }

        // ==========================================
        // 렌더링 및 디테일 연출 고도화
        // ==========================================
        function drawPlatforms() {
            const time = Date.now() * 0.002;
            
            for (let p of platforms) {
                if (p.x + p.w < cameraX || p.x > cameraX + 960 || p.y + p.h < cameraY || p.y > cameraY + 480) continue;
                
                ctx.save();
                
                if (p.isOneWay) {
                    // --- 일방통행 (One-way / Runic Slab) 발판 디자인 ---
                    const isLocked = p.isLocked;
                    
                    // 룬 마법 글로우 효과
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = isLocked ? "rgba(239, 68, 68, 0.8)" : "rgba(52, 211, 153, 0.8)";
                    
                    // 반투명 마법 석판 바디
                    let grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
                    if (isLocked) {
                        grad.addColorStop(0, "rgba(99, 27, 27, 0.65)");
                        grad.addColorStop(1, "rgba(69, 10, 10, 0.35)");
                    } else {
                        grad.addColorStop(0, "rgba(20, 83, 45, 0.65)");
                        grad.addColorStop(1, "rgba(6, 78, 59, 0.35)");
                    }
                    ctx.fillStyle = grad;
                    
                    // 모서리가 약간 둥근 석판 그리기
                    drawRoundRect(ctx, p.x, p.y, p.w, p.h, 4);
                    ctx.fill();
                    
                    // 테두리선
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = isLocked ? "rgba(239, 68, 68, 0.5)" : "rgba(52, 211, 153, 0.5)";
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    
                    // 석판 중앙에 룬 문자(Runic glyph) 효과 그리기
                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(p.x + 2, p.y + 1, p.w - 4, p.h - 2);
                    ctx.clip();
                    
                    // 룬 무늬 장식 (주기적으로 밝아졌다 어두워지는 애니메이션)
                    const pulse = Math.sin(time * 8) * 0.2 + 0.8;
                    ctx.strokeStyle = isLocked ? `rgba(239, 68, 68, ${0.4 * pulse})` : `rgba(52, 211, 153, ${0.4 * pulse})`;
                    ctx.lineWidth = 1;
                    
                    // 지그재그 마법 선
                    let runeCount = Math.max(1, Math.floor(p.w / 35));
                    for (let i = 0; i < runeCount; i++) {
                        let rx = p.x + (i + 0.5) * (p.w / runeCount);
                        ctx.beginPath();
                        ctx.moveTo(rx - 6, p.y + p.h/2 + 2);
                        ctx.lineTo(rx, p.y + 4);
                        ctx.lineTo(rx + 6, p.y + p.h/2 + 2);
                        ctx.lineTo(rx, p.y + p.h - 4);
                        ctx.closePath();
                        ctx.stroke();
                    }
                    
                    ctx.restore();
                } else {
                    // --- 일반 단단한 발판 (Solid Platforms) 디자인 ---
                    const isRound = p.isRoundFloor;
                    let currentRound = Math.max(1, Math.floor(player.y / CHUNK_H) + 1);
                    
                    // 1. 라운드(깊이)에 따른 돌벽 톤 설정
                    let grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
                    if (currentRound <= 3) {
                        // 1~3라운드: 갈색 빛 도는 고풍스러운 돌벽
                        grad.addColorStop(0, "#3a3028");
                        grad.addColorStop(1, "#1d1713");
                    } else if (currentRound <= 7) {
                        // 4~7라운드: 차가운 푸른 이끼 낀 어두운 석벽
                        grad.addColorStop(0, "#252e37");
                        grad.addColorStop(1, "#12171c");
                    } else if (currentRound <= 11) {
                        // 8~11라운드: 깊은 던전의 흑암 바위
                        grad.addColorStop(0, "#191522");
                        grad.addColorStop(1, "#0a080f");
                    } else {
                        // 12라운드 이상: 마그마 열기에 그을린 흑요석/화산암
                        grad.addColorStop(0, "#220e0a");
                        grad.addColorStop(1, "#0c0403");
                    }
                    ctx.fillStyle = grad;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    
                    // 2. 발판 표면 엣지 장식 (이끼/흙/마그마 띠)
                    let topColor = "#4d7c0f"; // 기본 이끼 (그린)
                    if (currentRound <= 3) {
                        topColor = "#854d0e"; // 흙/갈색 이끼
                    } else if (currentRound <= 7) {
                        topColor = "#15803d"; // 싱그러운 던전 이끼
                    } else if (currentRound <= 11) {
                        topColor = "#6b21a8"; // 보라색 독성 이끼
                    } else {
                        topColor = "#ea580c"; // 끓어오르는 용암 띠 (오렌지/레드)
                    }
                    
                    ctx.fillStyle = topColor;
                    ctx.fillRect(p.x, p.y, p.w, 4); // 상단 표면 4px 두께
                    
                    // 마그마 층(12라운드 이상)인 경우 상단 엣지에 광원 효과 추가
                    if (currentRound >= 12) {
                        ctx.save();
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = "#f97316";
                        ctx.strokeStyle = "#f97316";
                        ctx.lineWidth = 1.2;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y + 1);
                        ctx.lineTo(p.x + p.w, p.y + 1);
                        ctx.stroke();
                        ctx.restore();
                    }
                    
                    // 3. 벽돌 조인트 무늬 (가로/세로 어긋나는 돌 블록 무늬)
                    ctx.strokeStyle = "rgba(0,0,0,0.38)";
                    ctx.lineWidth = 1;
                    
                    // 가로 줄눈
                    const rowH = 15;
                    for (let by = p.y + rowH; by < p.y + p.h; by += rowH) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, by);
                        ctx.lineTo(p.x + p.w, by);
                        ctx.stroke();
                    }
                    
                    // 세로 줄눈 (어긋나게 배치)
                    const colW = 30;
                    let rowIndex = 0;
                    for (let by = p.y; by < p.y + p.h; by += rowH) {
                        let shift = (rowIndex % 2 === 0) ? (colW / 2) : 0;
                        for (let bx = p.x + shift; bx < p.x + p.w; bx += colW) {
                            ctx.beginPath();
                            ctx.moveTo(bx, by);
                            ctx.lineTo(bx, Math.min(by + rowH, p.y + p.h));
                            ctx.stroke();
                        }
                        rowIndex++;
                    }
                    
                    // 4. 돌벽 디테일 텍스처 (돌의 갈라짐, 이끼 자국 등 무작위 터치)
                    ctx.strokeStyle = "rgba(255,255,255,0.05)";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    if (p.w >= 40) {
                        ctx.moveTo(p.x + 10, p.y + 8);
                        ctx.lineTo(p.x + 14, p.y + 11);
                        
                        ctx.moveTo(p.x + p.w - 15, p.y + p.h - 8);
                        ctx.lineTo(p.x + p.w - 11, p.y + p.h - 11);
                    }
                    ctx.stroke();
                }
                
                ctx.restore();
            }
        }

        function drawBackground() {
            let currentRound = Math.max(1, Math.floor(player.y / CHUNK_H) + 1);
            
            // 1. 라운드(깊이)에 따른 배경 그라데이션 설정
            let bgGrad = ctx.createLinearGradient(0, 0, 0, 480);
            if (currentRound <= 3) {
                // 초입 던전: 흙/바위 갈색 톤
                bgGrad.addColorStop(0, "#1a1310");
                bgGrad.addColorStop(1, "#0a0706");
            } else if (currentRound <= 7) {
                // 중간층: 차가운 이끼 낀 청회색 던전 톤
                bgGrad.addColorStop(0, "#0e1115");
                bgGrad.addColorStop(1, "#050608");
            } else if (currentRound <= 11) {
                // 심연층: 기괴한 보라/어둠 톤
                bgGrad.addColorStop(0, "#100918");
                bgGrad.addColorStop(1, "#040207");
            } else {
                // 마그마/심층부: 하단에 붉은 마그마 광원 톤
                bgGrad.addColorStop(0, "#060201");
                bgGrad.addColorStop(0.7, "#120302");
                bgGrad.addColorStop(1, "#360802");
            }
            
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, 960, 480);
            
            // 2. 패럴랙스 배경 돌벽 균열 / 브릭 패턴 그리기
            let wallDepth = 0.15;
            let tileW = 120;
            let tileH = 60;
            let startCol = Math.floor((cameraX * wallDepth) / tileW) - 1;
            let endCol = startCol + Math.ceil(960 / tileW) + 2;
            let startRow = Math.floor((cameraY * wallDepth) / tileH) - 1;
            let endRow = startRow + Math.ceil(480 / tileH) + 2;
            
            ctx.save();
            let brickColor = "rgba(255, 255, 255, 0.02)";
            if (currentRound <= 3) brickColor = "rgba(139, 92, 26, 0.025)";
            else if (currentRound <= 7) brickColor = "rgba(16, 185, 129, 0.025)";
            else if (currentRound <= 11) brickColor = "rgba(168, 85, 247, 0.025)";
            else brickColor = "rgba(239, 68, 68, 0.035)";
            
            ctx.strokeStyle = brickColor;
            ctx.fillStyle = brickColor;
            
            for (let r = startRow; r < endRow; r++) {
                let y = r * tileH - (cameraY * wallDepth);
                let xOffset = (r % 2 === 0) ? (tileW / 2) : 0;
                
                // 가로선
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(960, y);
                ctx.stroke();
                
                for (let c = startCol; c < endCol; c++) {
                    let x = c * tileW + xOffset - (cameraX * wallDepth);
                    // 세로선
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x, y + tileH);
                    ctx.stroke();
                    
                    // 무작위 돌벽 균열(크랙) 효과
                    let crackSeed = Math.abs(Math.sin(r * 12.9898 + c * 78.233)) * 43758.5453;
                    if (crackSeed % 1 > 0.8) {
                        ctx.beginPath();
                        ctx.moveTo(x + 10, y + 10);
                        ctx.lineTo(x + 22, y + 20);
                        ctx.lineTo(x + 16, y + 32);
                        ctx.stroke();
                    }
                }
            }
            ctx.restore();
            
            // 3. 우주의 별 대신 지하의 부유하는 먼지 / 불씨 입자 렌더링
            for (let star of bgStars) {
                let sx = (star.x - cameraX * star.depth) % 960;
                let sy = (star.y - cameraY * star.depth) % 480;
                if (sx < 0) sx += 960;
                if (sy < 0) sy += 480;
                
                let flicker = Math.sin(Date.now() * 0.003 + star.x) * 0.35 + 0.65;
                ctx.save();
                
                let particleColor;
                if (currentRound >= 12) {
                    particleColor = star.isAmber ? `rgba(249, 115, 22, ${0.45 * flicker})` : `rgba(239, 68, 68, ${0.35 * flicker})`;
                } else if (currentRound >= 8) {
                    particleColor = `rgba(168, 85, 247, ${0.3 * flicker})`;
                } else if (currentRound >= 4) {
                    particleColor = `rgba(34, 211, 238, ${0.25 * flicker})`;
                } else {
                    particleColor = `rgba(234, 179, 8, ${0.25 * flicker})`;
                }
                
                ctx.fillStyle = particleColor;
                ctx.beginPath();
                ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawHUD() {
            // 던전 모험가 컨셉 인게임 HUD 박스 렌더링
            ctx.save();
            ctx.fillStyle = "rgba(18, 16, 15, 0.9)";
            ctx.strokeStyle = "rgba(234, 179, 8, 0.45)"; // 골드 테두리
            ctx.lineWidth = 1.5;
            
            ctx.beginPath();
            ctx.moveTo(10, 10);
            ctx.lineTo(260, 10);
            ctx.lineTo(270, 20);
            ctx.lineTo(270, 120);
            ctx.lineTo(20, 120);
            ctx.lineTo(10, 110);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // 데코 레이어 데칼 선 (골드)
            ctx.strokeStyle = "rgba(234, 179, 8, 0.8)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(10, 22);
            ctx.lineTo(10, 100);
            ctx.stroke();
            
            let activeChar = characters[currentCharIndex];
            let currentRound = Math.max(1, Math.floor(player.y / CHUNK_H) + 1);

            // 텍스트 인포 데코레이션 (GAME OVER 텍스트 스타일 적용)
            ctx.save();
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            // STAGE 타이틀 그리기 (지하 던전의 신비로운 룬/불빛 그라데이션)
            ctx.shadowColor = (currentRound >= 12) ? "rgba(239, 68, 68, 0.85)" : "rgba(234, 179, 8, 0.85)";
            ctx.shadowBlur = 10;
            let stageGrad = ctx.createLinearGradient(22, 18, 240, 18);
            if (currentRound >= 12) {
                stageGrad.addColorStop(0, "#f97316");
                stageGrad.addColorStop(1, "#b91c1c");
            } else if (currentRound >= 8) {
                stageGrad.addColorStop(0, "#c084fc");
                stageGrad.addColorStop(1, "#6b21a8");
            } else {
                stageGrad.addColorStop(0, "#fbbf24");
                stageGrad.addColorStop(1, "#d97706");
            }
            ctx.fillStyle = stageGrad;
            ctx.font = "900 15px 'Orbitron', sans-serif";
            ctx.fillText(`DUNGEON B${currentRound}F [${activeChar.name}]`, 22, 32);
            
            // GOLD / KILLS 정보 그리기 (네온 gold-orange 그라데이션)
            ctx.shadowColor = "rgba(251, 191, 36, 0.8)";
            ctx.shadowBlur = 10;
            let goldGrad = ctx.createLinearGradient(22, 40, 220, 40);
            goldGrad.addColorStop(0, "#ffe600");
            goldGrad.addColorStop(1, "#ff9900");
            ctx.fillStyle = goldGrad;
            ctx.font = "900 11px 'Orbitron', sans-serif";
            ctx.fillText(`GOLD: ${player.gold}G  |  KILLS: ${enemiesKilled}`, 22, 49);
            ctx.restore();

            // HP 바
            ctx.fillStyle = "rgba(255, 255, 255, 0.06)";
            ctx.fillRect(22, 59, 150, 12);
            let hpRatio = Math.max(player.hp, 0) / player.maxHp;
            let hpGrad = ctx.createLinearGradient(22, 0, 172, 0);
            hpGrad.addColorStop(0, "#ff2a5f");
            hpGrad.addColorStop(1, "#be002c");
            ctx.fillStyle = hpGrad;
            ctx.fillRect(22, 59, 150 * hpRatio, 12);
            
            ctx.save();
            ctx.shadowColor = "rgba(255, 42, 95, 0.6)";
            ctx.shadowBlur = 4;
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 8.5px 'Orbitron', sans-serif";
            ctx.fillText(`HP ${Math.max(player.hp, 0)}/${player.maxHp}`, 26, 68);
            ctx.restore();

            // 제트팩 체공 바
            ctx.fillStyle = "rgba(255, 255, 255, 0.06)";
            ctx.fillRect(22, 78, 150, 6);
            let hoverRatio = player.hoverGauge / player.maxHoverGauge;
            let jetGrad = ctx.createLinearGradient(22, 0, 172, 0);
            jetGrad.addColorStop(0, "#00f0ff");
            jetGrad.addColorStop(1, "#00a8cc");
            ctx.fillStyle = jetGrad;
            ctx.fillRect(22, 78, 150 * hoverRatio, 6);

            // 업그레이드 약식 목록
            ctx.save();
            ctx.shadowColor = "rgba(99, 102, 241, 0.5)";
            ctx.shadowBlur = 5;
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "bold 8.5px 'Orbitron', sans-serif";
            ctx.fillText(`UPGRADE: R:${player.stats.rapid} S:${player.stats.spread} P:${player.stats.power} J:${player.stats.jump} H:${player.stats.hover} W:${player.stats.wallPierce}`, 22, 102);
            ctx.restore();
            
            ctx.restore();
        }

        function drawOffScreenIndicators() {
            // 시야 밖 보스 위치 방향 알림 UI 렌더링
            for (let e of enemies) {
                if (e.isBoss && !e.dead) {
                    let screenX = e.x + e.w/2 - cameraX;
                    let screenY = e.y + e.h/2 - cameraY;

                    // 화면 내에 있으면 오프스크린 마커 미표시
                    if (screenX >= 0 && screenX <= 960 && screenY >= 0 && screenY <= 480) continue;

                    let edgeX = Math.min(Math.max(screenX, 20), 940);
                    let edgeY = Math.min(Math.max(screenY, 20), 460);

                    ctx.fillStyle = "#ef4444";
                    ctx.beginPath();
                    ctx.arc(edgeX, edgeY, 7, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = "#ffffff"; ctx.font = "bold 9px Arial"; ctx.textAlign = "center";
                    ctx.fillText("⚠️", edgeX, edgeY + 3);
                    ctx.textAlign = "left"; // 정렬 원복
                }
            }
        }

        function drawCrosshair() {
            if (joysticks.right.active) return; // 모바일 조이스틱 활성화 시 미표시
            
            ctx.save();
            ctx.translate(mouse.x, mouse.y);
            ctx.strokeStyle = player.shootCooldown > 0 ? "rgba(239, 68, 68, 0.6)" : "rgba(34, 197, 94, 0.8)";
            ctx.lineWidth = 1.5;

            // 조준점 외곽 링
            ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.stroke();
            // 십자 에임 크로스선
            ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(-4, 0); ctx.moveTo(4, 0); ctx.lineTo(12, 0);
            ctx.moveTo(0, -12); ctx.lineTo(0, -4); ctx.moveTo(0, 4); ctx.lineTo(0, 12); ctx.stroke();

            // 원형 재장전 쿨타임 UI 인디케이터
            if (player.shootCooldown > 0) {
                let charData = characters[currentCharIndex];
                let maxCd = charData.baseCooldown - (player.stats.rapid * 2);
                if (maxCd < 16) maxCd = 16;
                let cdProgress = player.shootCooldown / maxCd;

                ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 12, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * cdProgress));
                ctx.stroke();
            }
            ctx.restore();
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const targetWidth = Math.round(rect.width * dpr);
            const targetHeight = Math.round(rect.height * dpr);
            
            if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
                canvas.width = targetWidth;
                canvas.height = targetHeight;
                ctx.imageSmoothingEnabled = false; // 픽셀 아트 고유의 외곽선 선명도 보존
            }
        }

        function draw() {
            resizeCanvas();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save(); // 최외곽 기기 물리 DPI 대응 고해상도 스케일 보정
            const scaleX = canvas.width / 960;
            const scaleY = canvas.height / 480;
            ctx.scale(scaleX, scaleY);
            
            ctx.save();
            // 화면 흔들림(Screen Shake) 카메라 좌표 왜곡 연산 적용
            if (shakeTimer > 0) {
                let dx = (Math.random() - 0.5) * shakeMagnitude;
                let dy = (Math.random() - 0.5) * shakeMagnitude;
                ctx.translate(dx, dy);
            }

            drawBackground();
            
            ctx.save();
            ctx.translate(-cameraX, -cameraY);

            drawPlatforms();
            for (let s of shops) {
                // 상점 본체 (어두운 아케이드 기기 느낌)
                ctx.fillStyle = "#1e293b"; 
                ctx.fillRect(s.x, s.y, s.w, s.h);
                
                // 노란색 네온 테두리 포인트
                ctx.strokeStyle = "#eab308"; 
                ctx.lineWidth = 2;
                ctx.strokeRect(s.x, s.y, s.w, s.h);
                
                // SHOP 간판 텍스트
                ctx.save();
                ctx.shadowColor = "rgba(250, 204, 21, 0.85)";
                ctx.shadowBlur = 8;
                ctx.fillStyle = "#facc15"; 
                ctx.font = "900 13px 'Orbitron', sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("SHOP", s.x + s.w / 2, s.y + 20);
                ctx.restore();
                ctx.textAlign = "left"; // 다른 텍스트 렌더링을 위해 정렬 원상복구
                
                // 기기 중앙 화면 디테일
                ctx.fillStyle = "#0f172a";
                ctx.fillRect(s.x + 8, s.y + 28, s.w - 16, s.h - 36);
                
                // 화면 속 깜빡이는 포인트 효과 (살아있는 상점 느낌 추가)
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillStyle = "#38bdf8";
                    ctx.fillRect(s.x + s.w / 2 - 4, s.y + 36, 8, 8);
                }
            }
            for (let item of items) {
                if (!item.picked) {
                    ctx.save();
                    ctx.fillStyle = item.color; ctx.fillRect(item.x, item.y, item.w, item.h);
                    // 빛나는 네온 박스 효과 연출 추가
                    ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1; ctx.strokeRect(item.x, item.y, item.w, item.h);
                    
                    // 알파벳 폰트 디자인 톤 맞추기 ('Orbitron' 사용, 중앙 정렬)
                    ctx.fillStyle = "#ffffff"; 
                    ctx.font = "900 11px 'Orbitron', sans-serif"; 
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    let letter = "P";
                    if (item.type.includes("RAPID")) letter = "R";
                    else if (item.type.includes("SPREAD")) letter = "S";
                    else if (item.type.includes("HP")) letter = "H";
                    
                    ctx.fillText(letter, item.x + item.w / 2, item.y + item.h / 2 + 1);
                    ctx.restore();
                }
            }

            for (let d of drops) {
                if (d.life < 60 && Math.floor(d.life / 5) % 2 === 0) continue; 
                ctx.fillStyle = d.color; ctx.fillRect(d.x, d.y, d.w, d.h);
                if (d.type !== "TOXIC_CLOUD") {
                    ctx.fillStyle = "#ffffff"; ctx.fillRect(d.x+1, d.y+1, d.w-2, d.h-2);
                }
            }

            // 에너미 및 보스 렌더링 + 화이트 플래시 연출
            for (let e of enemies) {
                if (e.dead) continue;
                ctx.save();
                
                // 은신(STEALTH) 처리
                if (e.isCloaked) {
                    ctx.globalAlpha = 0.15; // 거의 안 보임
                }
                
                if (e.flashTimer > 0) {
                    ctx.fillStyle = "#ffffff"; // 피격 시 순백색 렌더링으로 타격감 극대화
                } else {
                    ctx.fillStyle = e.color;
                }
                ctx.fillRect(e.x, e.y, e.w, e.h);
                
                if (e.isBoss) {
                    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.strokeRect(e.x, e.y, e.w, e.h);
                }
                
                ctx.fillStyle = "#1e293b"; ctx.fillRect(e.x, e.y - 8, e.w, 3);
                ctx.fillStyle = e.isBoss ? "#eab308" : "#22c55e"; 
                ctx.fillRect(e.x, e.y - 8, e.w * (e.hp / e.maxHp), 3);

                // 몬스터 이름 렌더링 (디자인 폰트로 개성 노출)
                if (!e.isCloaked || e.flashTimer > 0) {
                    ctx.fillStyle = e.isBoss ? "#facc15" : "rgba(255, 255, 255, 0.75)";
                    ctx.font = e.isBoss ? "900 8.5px 'Orbitron', sans-serif" : "bold 7.5px 'Outfit', sans-serif";
                    ctx.textAlign = "center";
                    ctx.fillText(e.name || "괴물", e.x + e.w / 2, e.y - 12);
                }
                
                // 말풍선(치지직 채팅) 렌더링
                if (e.chatText && e.chatTimer > 0) {
                    drawSpeechBubble(ctx, e.x + e.w/2, e.y - 8, e.chatNick || "ChzzkChat", e.chatText, e.chatTimer, e.chatEmojis || {}, e.color || "#ffffff");
                }
                ctx.restore();
            }

            // 아군 렌더링 + 피격 플래시 연출
            let activeChar = characters[currentCharIndex];
            if (player.invulnerable <= 0 || Math.floor(player.invulnerable / 5) % 2 === 0) {
                ctx.fillStyle = player.flashTimer > 0 ? "#ffffff" : activeChar.color;
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            // 플레이어 말풍선 렌더링
            if (player.chatText && player.chatTimer > 0) {
                drawSpeechBubble(ctx, player.x + player.width/2, player.y - 8, player.chatNick || "Tester", player.chatText, player.chatTimer, player.chatEmojis || {}, activeChar.color || "#ffffff");
            }

            // 투사체 구체 렌더링
            for (let b of bullets) {
                ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill();
            }
            for (let b of enemyBullets) {
                ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill();
            }
            for (let p of particles) {
                ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 2, 2);
            }

            // 플로팅 데미지 텍스트 렌더링
            for (let t of damageTexts) {
                ctx.save();
                ctx.globalAlpha = t.alpha;
                ctx.fillStyle = t.color;
                ctx.font = "900 13px 'Orbitron', sans-serif";
                ctx.shadowColor = t.color; ctx.shadowBlur = 6;
                ctx.fillText(t.text, t.x, t.y);
                ctx.restore();
            }

            ctx.restore(); // camera coordinate out
            ctx.restore(); // screen shake out

            // 인터페이스 캔버스 고정 레이어 영역
            drawHUD();
            drawOffScreenIndicators();
            drawCrosshair();

            // 가상 조이스틱 모바일 고정 레이어 연출
            ctx.globalAlpha = 0.35;
            if (joysticks.left.active) {
                ctx.beginPath(); ctx.arc(joysticks.left.originX, joysticks.left.originY, 60, 0, Math.PI*2); ctx.fillStyle = "#ffffff"; ctx.fill();
                ctx.beginPath(); ctx.arc(joysticks.left.x, joysticks.left.y, 25, 0, Math.PI*2); ctx.fillStyle = "#2563eb"; ctx.fill();
            }
            if (joysticks.right.active) {
                ctx.beginPath(); ctx.arc(joysticks.right.originX, joysticks.right.originY, 60, 0, Math.PI*2); ctx.fillStyle = "#ffffff"; ctx.fill();
                ctx.beginPath(); ctx.arc(joysticks.right.x, joysticks.right.y, 25, 0, Math.PI*2); ctx.fillStyle = "#dc2626"; ctx.fill();
            }
            ctx.globalAlpha = 1.0;
            
            ctx.restore(); // 고해상도 매핑 스케일 restore
        }

        function loop() {
            if (gameActive) update();
            draw();
            requestAnimationFrame(loop);
        }

        // 둥근 사각형 그리기 헬퍼 함수
        function drawRoundRect(ctx, x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        // ==========================================
        // 치지직 커스텀 이모지 캐싱 및 말풍선 렌더링 시스템
        // ==========================================
        let emojiCache = {};
        function getEmojiImage(emojiId, url) {
            if (emojiCache[emojiId]) return emojiCache[emojiId];
            const img = new Image();
            img.src = url;
            emojiCache[emojiId] = img;
            return img;
        }

        function drawSpeechBubble(ctx, x, y, nick, text, timer, emojis = {}, activeColor = "#00ffa3") {
            ctx.save();
            
            // 이모지 코드 파싱 ({:emoji_id:})
            const parts = text.split(/({:[^}]+:})/g);
            let contentWidth = 0;
            const parsedContents = [];
            
            ctx.font = "bold 12px 'Malgun Gothic', sans-serif";
            parts.forEach(part => {
                if (!part) return;
                const emojiMatch = part.match(/^{:([^}]+):}$/);
                if (emojiMatch && emojis[emojiMatch[1]]) {
                    parsedContents.push({
                        type: "emoji",
                        id: emojiMatch[1],
                        url: emojis[emojiMatch[1]]
                    });
                    contentWidth += 26; // 이모지 렌더링 가로 점유 (20px 이미지 + 여백)
                } else {
                    parsedContents.push({ type: "text", text: part });
                    contentWidth += ctx.measureText(part).width;
                }
            });

            ctx.font = "bold 10px 'Malgun Gothic', sans-serif";
            let nickWidth = ctx.measureText(nick).width;
            
            let bubbleWidth = Math.max(contentWidth, nickWidth) + 20; // 좌우 여백 넉넉히 20px
            let bubbleHeight = 44; // sample 높이인 44px로 복원
            
            if (timer < 30) ctx.globalAlpha = timer / 30; // 소멸 시 서서히 투명화
            
            let bx = x - bubbleWidth / 2;
            let by = y - bubbleHeight - 12;

            // 말풍선 박스 (sample 스타일: 밝은 흰색 배경, 선명한 테두리)
            ctx.fillStyle = "rgba(255, 255, 255, 0.96)";
            ctx.strokeStyle = activeColor || "#00ffa3";
            ctx.lineWidth = 2; // 테두리 굵기 2px

            drawRoundRect(ctx, bx, by, bubbleWidth, bubbleHeight, 8); // 둥글기 8px
            ctx.fill();
            ctx.stroke();

            // 말풍선 꼬리
            ctx.beginPath();
            ctx.moveTo(x - 6, by + bubbleHeight);
            ctx.lineTo(x + 6, by + bubbleHeight);
            ctx.lineTo(x, by + bubbleHeight + 8); // 꼬리 깊이 8px
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 닉네임 렌더링
            ctx.fillStyle = activeColor || "#1e293b";
            ctx.textAlign = "center";
            ctx.font = "bold 10px 'Malgun Gothic', sans-serif";
            ctx.fillText(nick, x, by + 16);

            // 내용물 렌더링 (밝은 배경이므로 텍스트는 어두운 톤)
            let startX = x - contentWidth / 2;
            let startY = by + 32;

            ctx.textAlign = "left";
            parsedContents.forEach(item => {
                if (item.type === "emoji") {
                    const img = getEmojiImage(item.id, item.url);
                    if (img.complete) {
                        ctx.drawImage(img, startX, startY - 14, 20, 20); // 20px 스케일 드로잉
                    } else {
                        ctx.fillStyle = "rgba(0,0,0,0.1)";
                        ctx.fillRect(startX, startY - 14, 20, 20);
                        img.onload = () => {}; 
                    }
                    startX += 26;
                } else {
                    ctx.fillStyle = "#111827"; // 거의 검은색
                    ctx.font = "bold 12px 'Malgun Gothic', sans-serif";
                    ctx.fillText(item.text, startX, startY);
                    startX += ctx.measureText(item.text).width;
                }
            });

            ctx.restore();
        }

        // ==========================================
        // 치지직 채팅 연동 시스템 (로컬 중계 서버 전용)
        // ==========================================
        let socket = null;

        function loadSocketIo(url, callback) {
            if (typeof io !== 'undefined') {
                callback();
                return;
            }
            const script = document.createElement('script');
            script.src = `${url}/socket.io/socket.io.js`;
            script.onload = callback;
            script.onerror = () => {
                addSystemLog("❌ Socket.io 라이브러리 로드 실패. 서버가 켜져 있는지 확인하세요.");
            };
            document.head.appendChild(script);
        }

        let lastConnectedUrl = "";

        function initSocketConnection(callback) {
            const localUrl = document.getElementById('localProxyUrl').value.trim() || "http://localhost:3000";
            
            if (socket && socket.connected && lastConnectedUrl === localUrl) {
                if (callback) callback();
                return;
            }
            
            if (socket) {
                socket.disconnect();
                socket = null;
            }
            
            addSystemLog(`🔌 중계 서버 접속 중... (${localUrl})`);
            loadSocketIo(localUrl, () => {
                try {
                    socket = io(localUrl);
                    lastConnectedUrl = localUrl;
                    
                    socket.on("connect", () => {
                        addSystemLog("✅ 중계 서버 접속 완료!");
                        if (callback) callback();
                    });
                    
                    socket.on("channelConnected", () => {
                        addSystemLog("🟢 치지직 채널 연동 성공! 실시간 채팅 수신 중...");
                        updateChzzkUIStatus(true);
                    });
                    
                    socket.on("channelError", (err) => {
                        addSystemLog(`❌ 연동 실패: ${err}`);
                        alert(`치지직 연동 오류: ${err}`);
                        updateChzzkUIStatus(false);
                    });
                    
                    socket.on("chatMessage", (data) => {
                        handleReceivedRelayChat(data.nickname, data.message, data.emojis);
                    });
                    
                    socket.on("disconnect", () => {
                        addSystemLog("🔴 중계 서버 연결 해제");
                        updateChzzkUIStatus(false);
                    });
                } catch (e) {
                    addSystemLog(`❌ 소켓 초기화 실패: ${e.message}`);
                    updateChzzkUIStatus(false);
                }
            });
        }

        function connectChzzk(channelId) {
            initSocketConnection(() => {
                addSystemLog(`치지직 채널 [${channelId}] 연동 요청 중...`);
                socket.emit("joinChannel", channelId);
            });
        }



        function handleReceivedRelayChat(nickname, message, emojis) {
            let aliveEnemies = enemies.filter(e => !e.dead);
            
            // 시야 내 적 우선 필터링
            let visibleEnemies = aliveEnemies.filter(e => 
                e.x + e.w > cameraX && e.x < cameraX + 960 &&
                e.y + e.h > cameraY && e.y < cameraY + 480
            );
            
            let targetPool = visibleEnemies.length > 0 ? visibleEnemies : aliveEnemies;
            
            if (targetPool.length > 0) {
                let target = targetPool[Math.floor(Math.random() * targetPool.length)];
                target.chatNick = nickname;
                target.chatText = message;
                target.chatEmojis = emojis || {};
                target.chatTimer = 300; // 5초간 유지 (60fps * 5)
            } else {
                player.chatNick = nickname;
                player.chatText = message;
                player.chatEmojis = emojis || {};
                player.chatTimer = 300; // 5초간 유지
            }
        }

        function updateChzzkUIStatus(connected) {
            let statusEl = document.getElementById('chzzkStatus');
            let btnConnect = document.getElementById('btnConnectChzzk');
            let btnDisconnect = document.getElementById('btnDisconnectChzzk');
            if (connected) {
                if (statusEl) statusEl.innerHTML = "연결됨 🟢";
                if (statusEl) statusEl.style.color = "#10b981";
                if (btnConnect) btnConnect.style.display = "none";
                if (btnDisconnect) btnDisconnect.style.display = "block";
            } else {
                if (statusEl) statusEl.innerHTML = "연결 끊김 🔴";
                if (statusEl) statusEl.style.color = "#ef4444";
                if (btnConnect) btnConnect.style.display = "block";
                if (btnDisconnect) btnDisconnect.style.display = "none";
            }
        }

        function addSystemLog(text) {
            let logEl = document.getElementById('chzzkLog');
            if (logEl) {
                logEl.innerText += "\n" + text;
                logEl.scrollTop = logEl.scrollHeight;
            }
        }



        // 치지직 UI 이벤트 바인딩
        let btnOpenChzzk = document.getElementById('btnOpenChzzkUI');
        let btnCloseChzzk = document.getElementById('btnCloseChzzkUI');
        let chzzkUI = document.getElementById('chzzkUI');
        

        
        if (btnOpenChzzk) {
            btnOpenChzzk.addEventListener('click', () => {
                if (chzzkUI) {
                    chzzkUI.style.display = 'flex';
                    setTimeout(() => chzzkUI.classList.add('show'), 10);
                }
            });
        }
        if (btnCloseChzzk) {
            btnCloseChzzk.addEventListener('click', () => {
                if (chzzkUI) {
                    chzzkUI.classList.remove('show');
                    setTimeout(() => chzzkUI.style.display = 'none', 200);
                }
            });
        }
        
        let btnConnectChzzk = document.getElementById('btnConnectChzzk');
        if (btnConnectChzzk) {
            btnConnectChzzk.addEventListener('click', () => {
                let inputVal = document.getElementById('chzzkChannelId').value.trim();
                if (!inputVal) {
                    alert("치지직 채널 ID 또는 방송 URL을 입력해주세요.");
                    return;
                }
                
                // URL 형태인 경우 정규식 또는 문자열 조작을 통해 채널 ID 추출
                let channelId = inputVal;
                if (inputVal.includes('chzzk.naver.com/')) {
                    let parts = inputVal.split('chzzk.naver.com/');
                    if (parts.length > 1) {
                        let subParts = parts[1].split(/[/?#]/);
                        if (subParts[0] === 'live' && subParts.length > 1) {
                            channelId = subParts[1];
                        } else {
                            channelId = subParts[0];
                        }
                    }
                }
                addSystemLog(`추출된 채널 ID: ${channelId}`);
                connectChzzk(channelId);
            });
        }
        let btnDisconnectChzzk = document.getElementById('btnDisconnectChzzk');
        if (btnDisconnectChzzk) {
            btnDisconnectChzzk.addEventListener('click', () => {
                if (socket) {
                    socket.disconnect();
                    socket = null;
                }
                addSystemLog("🔴 연동을 종료했습니다.");
                updateChzzkUIStatus(false);
            });
        }
        


        initLevel(currentSeed);
        loop();
    </script>
</body>
</html>
