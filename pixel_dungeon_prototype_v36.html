        function openShopUI(shop) {
            currentShop = shop;
            let el = document.getElementById('shopUI');
            el.style.display = 'flex';
            el.offsetHeight; // Force reflow
            el.classList.add('show');
            updateShopUI();
        }

        function closeShopUI() {
            currentShop = null;
            let el = document.getElementById('shopUI');
            el.classList.remove('show');
            setTimeout(() => {
                if (!currentShop && !el.classList.contains('show')) {
                    el.style.display = 'none';
                }
            }, 200);
        }

        function updateShopUI() {
            if (!currentShop) return;
            try {
                let goldDisp = document.getElementById('shopGoldDisplay');
                if (goldDisp) goldDisp.innerText = player.gold;
                
                let container = document.getElementById('shopItemsContainer');
                if (!container) return;
                container.innerHTML = '';
                
                if (currentShop.items && Array.isArray(currentShop.items)) {
                    currentShop.items.forEach((item, index) => {
                        let btn = document.createElement('button');
                        if (item.bought) {
                            btn.classList.add('bought');
                        } else {
                            btn.style.setProperty('--btn-color', item.color || '#6366f1');
                        }
                        
                        let title = document.createElement('span');
                        title.innerText = item.name || "Unknown";
                        title.style.fontSize = "13px";
                        
                        let cost = document.createElement('span');
                        cost.className = 'shop-cost-tag';
                        let costData = upgradeCostMap[item.type] || { base: 40, inc: 15, stat: "rapid" };
                        let currentLvl = (player.stats && player.stats[costData.stat]) ? player.stats[costData.stat] : 0;
                        let dynamicCost = costData.base + (currentLvl * costData.inc);

                        cost.innerText = item.bought ? "SOLD" : dynamicCost + "G";
                        
                        btn.appendChild(title);
                        btn.appendChild(cost);
                        
                        btn.disabled = item.bought || player.gold < dynamicCost;
                        btn.onclick = () => {
                            if (!item.bought && player.gold >= dynamicCost) {
                                player.gold -= dynamicCost;
                                item.bought = true;
                                applyUpgrade(item.type);
                                spawnParticles(player.x + player.width/2, player.y + player.height/2, item.color, 20);
                                updateShopUI(); 
                            }
                        };
                        container.appendChild(btn);
                    });
                }

                let healBtn = document.getElementById('btnHealFull');
                if (healBtn) {
                    healBtn.disabled = player.gold < 100 || player.hp >= player.maxHp;
                    healBtn.onclick = () => {
                        if (player.gold >= 100 && player.hp < player.maxHp) {
                            player.gold -= 100;
                            player.hp = player.maxHp;
                            sfx.upgrade();
                            spawnParticles(player.x + player.width/2, player.y + player.height/2, "#10b981", 25);
                            updateShopUI();
                        }
                    };
                }
                
                let rrBtn = document.getElementById('btnReroll');
                if (rrBtn) {
                    rrBtn.innerText = `🔄 리롤 (${currentShop.rerollCost}G)`;
                    rrBtn.disabled = player.gold < currentShop.rerollCost;
                    rrBtn.onclick = () => {
                        if(player.gold >= currentShop.rerollCost) {
                            player.gold -= currentShop.rerollCost;
                            currentShop.rerollCost *= 2; 
                            currentShop.items = generateShopItemsRandomly();
                            sfx.upgrade();
                            updateShopUI();
                        }
                    };
                }
            } catch(e) {
                console.error("Shop UI Error: ", e);
            }
        }

        function applyUpgrade(type) {
            sfx.upgrade();
            if (type === "UPGRADE_RAPID") player.stats.rapid++;
            if (type === "UPGRADE_SPREAD") player.stats.spread++;
            if (type === "UPGRADE_POWER") player.stats.power++;
            if (type === "SPEC_JUMP") player.stats.jump++;
            if (type === "SPEC_HOVER") {
                player.stats.hover++; player.maxHoverGauge += 100; player.hoverGauge += 100;
            }
            if (type === "SPEC_HP") {
                player.stats.hpUp++; player.maxHp += 20; player.hp += 20; 
            }
            if (type === "SPEC_WALL_PIERCE") player.stats.wallPierce++;
        }

        window.addEventListener('keydown', (e) => {
            sfx.init(); 
            if (e.key.toLowerCase() === 'a') keys.a = true;
            if (e.key.toLowerCase() === 'd') keys.d = true;
            if (e.key.toLowerCase() === 'w') keys.w = true;
            if (e.key.toLowerCase() === 's') keys.s = true;
            if (e.code === 'Space') { keys.space = true; e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'a') keys.a = false;
            if (e.key.toLowerCase() === 'd') keys.d = false;
            if (e.key.toLowerCase() === 'w') keys.w = false;
            if (e.key.toLowerCase() === 's') keys.s = false;
            if (e.code === 'Space') keys.space = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.clientX - rect.left) * (960 / rect.width);
            mouse.y = (e.clientY - rect.top) * (480 / rect.height);
        });
        canvas.addEventListener('mousedown', (e) => { 
            sfx.init();
            if (e.button === 0) mouse.isDown = true; 
        });
        canvas.addEventListener('mouseup', (e) => { if (e.button === 0) mouse.isDown = false; });

        function getTouchPos(t) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (t.clientX - rect.left) * (960 / rect.width),
                y: (t.clientY - rect.top) * (480 / rect.height)
            };
        }

        canvas.addEventListener('touchstart', (e) => {
            sfx.init();
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return; 
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                let pos = getTouchPos(t);

                if (pos.x < 960 / 2 && !joysticks.left.active) {
                    joysticks.left.active = true;
                    joysticks.left.id = t.identifier;
                    joysticks.left.originX = pos.x; joysticks.left.originY = pos.y;
                    joysticks.left.x = pos.x; joysticks.left.y = pos.y;
                } else if (pos.x >= 960 / 2 && !joysticks.right.active) {
                    joysticks.right.active = true;
                    joysticks.right.id = t.identifier;
                    joysticks.right.originX = pos.x; joysticks.right.originY = pos.y;
                    joysticks.right.x = pos.x; joysticks.right.y = pos.y;
                }
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                let pos = getTouchPos(t);
                if (joysticks.left.active && t.identifier === joysticks.left.id) {
                    joysticks.left.x = pos.x; joysticks.left.y = pos.y;
                } else if (joysticks.right.active && t.identifier === joysticks.right.id) {
                    joysticks.right.x = pos.x; joysticks.right.y = pos.y;
                }
            }
        }, {passive: false});

        function handleTouchEnd(e) {
            if(e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (joysticks.left.active && t.identifier === joysticks.left.id) joysticks.left.active = false;
                else if (joysticks.right.active && t.identifier === joysticks.right.id) joysticks.right.active = false;
            }
        }
        canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
        canvas.addEventListener('touchcancel', handleTouchEnd, {passive: false});

        function triggerGameOver() {
            gameActive = false;
            let currentRound = Math.max(1, Math.floor(player.y / CHUNK_H) + 1);
            document.getElementById('goRound').innerText = currentRound;
            document.getElementById('goKills').innerText = enemiesKilled;
            let el = document.getElementById('gameOverScreen');
            el.style.display = 'flex';
            el.offsetHeight; // Force reflow
            el.classList.add('show');
        }

        function takeDamage(amount) {
            if (player.invulnerable <= 0) {
                player.hp -= amount;
                player.invulnerable = 60; 
                player.flashTimer = 8; 
                triggerScreenShake(7, 15); 
                sfx.damage();
                spawnFloatingText(player.x + player.width/2, player.y - 10, `-${amount}`, "#ef4444");
                spawnParticles(player.x + player.width/2, player.y + player.height/2, "#ef4444", 15);
                if (player.hp <= 0) triggerGameOver();
            }
        }

        function getMouseAngle(sourceX, sourceY) {
            let worldMouseX = mouse.x + cameraX;
            let worldMouseY = mouse.y + cameraY;
            return Math.atan2(worldMouseY - sourceY, worldMouseX - sourceX);
        }

        function shoot() {
            if (player.shootCooldown > 0) return;

            let pCenterX = player.x + player.width / 2;
            let pCenterY = player.y + player.height / 2;
            let angle = currentAimAngle; 
            let charData = characters[currentCharIndex];

            let cooldown = charData.baseCooldown - (player.stats.rapid * 2);
            if (cooldown < 16) cooldown = 16;
            player.shootCooldown = cooldown;
            sfx.shoot();

            let totalBullets = 1 + charData.baseSpread + player.stats.spread;
            let spreadAngle = 0.15;
            let startAngle = angle - (totalBullets - 1) * spreadAngle / 2;

            let dmg = charData.baseDamage + (player.stats.power * 4);
            let radius = 4 + (player.stats.power * 0.5);
            let speed = 7 + (player.stats.rapid * 0.25); 

            for (let i = 0; i < totalBullets; i++) {
                createBullet(bullets, pCenterX, pCenterY, startAngle + (i * spreadAngle), charData.isPierce ? "PIERCE" : "NORMAL", speed, charData.color, true, dmg, radius);
            }
        }

        function createBullet(targetArray, x, y, angle, type, speed, color, isPlayer, damage = 10, radius = 4) {
            targetArray.push({
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: radius, color: color,
                type: type, life: 100, isPlayer: isPlayer, damage: damage,
                hitSet: new Set() 
            });
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.w &&
                   rect1.x + rect1.w > rect2.x &&
                   rect1.y < rect2.y + rect2.h &&
                   rect1.y + rect1.h > rect2.y;
        }

        function spawnParticles(x, y, color, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 20 + Math.random() * 20,
                    color: color
                });
            }
        }

        function update() {
            if (!gameActive) return;

            updateChunks();

            let pRect = {x: player.x, y: player.y, w: player.width, h: player.height};

            let overlappingShop = null;
            for (let s of shops) {
                if (checkCollision(pRect, s)) { overlappingShop = s; break; }
            }
            if (overlappingShop && currentShop !== overlappingShop) openShopUI(overlappingShop);
            else if (!overlappingShop && currentShop) closeShopUI();

            if (player.invulnerable > 0) player.invulnerable--;
            if (player.flashTimer > 0) player.flashTimer--;
            
            // 플레이어 말풍선 수명 차감
            if (player.chatTimer && player.chatTimer > 0) {
                player.chatTimer--;
                if (player.chatTimer <= 0) player.chatText = null;
            }

            if (shakeTimer > 0) shakeTimer--;

            for (let i = damageTexts.length - 1; i >= 0; i--) {
                let t = damageTexts[i];
                t.y += t.vy; t.life--; t.alpha = t.life / 55;
                if (t.life <= 0) damageTexts.splice(i, 1);
            }

            let isMoveLeft = keys.a;
            let isMoveRight = keys.d;
            let isMoveDown = keys.s; 
            let isJumpKeyPressed = keys.w || keys.space;
            let isShooting = mouse.isDown;
            let pCenterX = player.x + player.width / 2;
            let pCenterY = player.y + player.height / 2;

            if (joysticks.left.active) {
                let dx = joysticks.left.x - joysticks.left.originX;
                let dy = joysticks.left.y - joysticks.left.originY;
                let dist = Math.hypot(dx, dy);
                if (dist > 60) {
                    joysticks.left.x = joysticks.left.originX + (dx / dist) * 60;
                    joysticks.left.y = joysticks.left.originY + (dy / dist) * 60;
                }
                if (dx < -20) isMoveLeft = true;
                if (dx > 20) isMoveRight = true;
                if (dy < -30) isJumpKeyPressed = true;
                if (dy > 30) isMoveDown = true; 
            }

            if (joysticks.right.active) {
                let dx = joysticks.right.x - joysticks.right.originX;
                let dy = joysticks.right.y - joysticks.right.originY;
                let dist = Math.hypot(dx, dy);
                if (dist > 60) {
                    joysticks.right.x = joysticks.right.originX + (dx / dist) * 60;
                    joysticks.right.y = joysticks.right.originY + (dy / dist) * 60;
                }
                if (dist > 15) { currentAimAngle = Math.atan2(dy, dx); isShooting = true; }
            } else {
                currentAimAngle = getMouseAngle(pCenterX, pCenterY);
            }

            let charSpeed = characters[currentCharIndex].speed;
            if (isMoveLeft) player.vx = -charSpeed;
            else if (isMoveRight) player.vx = charSpeed;
            else player.vx *= 0.8;

            let actualJumpForce = characters[currentCharIndex].jumpForce + (player.stats.jump * 1.0); 

            if (isJumpKeyPressed && player.grounded) {
                player.vy = -actualJumpForce; player.grounded = false; player.isHovering = false; sfx.jump();
            } else if (isJumpKeyPressed && !player.grounded && player.vy >= -3 && player.hoverGauge > 0) {
                player.vy = -1.8; player.isHovering = true; player.hoverGauge -= 1.5; 
                if (player.hoverGauge < 0) player.hoverGauge = 0;
                if (Math.random() > 0.5) spawnParticles(player.x + player.width/2, player.y + player.height, "#38bdf8", 1);
            } else {
                player.vy += GRAVITY; player.isHovering = false;
            }

            player.x += player.vx; pRect.x = player.x;
            let maxStep = player.height / 2; 

            for (let p of platforms) {
                if (p.isOneWay) continue; 
                if (checkCollision(pRect, p)) {
                    let pTop = p.y; let pBottomEdge = player.y + player.height;
                    if (player.grounded && player.vy >= 0 && pBottomEdge - pTop > 0 && pBottomEdge - pTop <= maxStep) {
                        player.y = pTop - player.height; pRect.y = player.y;
                    } else {
                        if (player.vx > 0) player.x = p.x - player.width;
                        if (player.vx < 0) player.x = p.x + p.w;
                        pRect.x = player.x;
                    }
                }
            }

            let activeBosses = new Set();
            for (let e of enemies) {
                if (e.isBoss && !e.dead) activeBosses.add(e.chunkKey);
            }
            for (let p of platforms) {
                if (p.isOneWay && p.isLocked) {
                    if (!activeBosses.has(p.chunkKey)) { p.isLocked = false; spawnParticles(p.x + p.w/2, p.y, "#38bdf8", 30); sfx.upgrade(); }
                }
            }

            let prevBottom = player.y - player.vy + player.height;
            player.y += player.vy; player.grounded = false; pRect.y = player.y;

            for (let p of platforms) {
                if (checkCollision(pRect, p)) {
                    if (p.isOneWay) {
                        if (player.vy > 0 && prevBottom <= p.y + 15) {
                            if (isMoveDown && !p.isLocked) { } 
                            else {
                                player.y = p.y - player.height; player.vy = 0; player.grounded = true; player.hoverGauge += 10;
                                if (player.hoverGauge > player.maxHoverGauge) player.hoverGauge = player.maxHoverGauge;
                            }
                        }
                    } else {
                        if (player.vy > 0) {
                            player.y = p.y - player.height; player.vy = 0; player.grounded = true; player.hoverGauge += 10;
                            if (player.hoverGauge > player.maxHoverGauge) player.hoverGauge = player.maxHoverGauge;
                        } else if (player.vy < 0) {
                            player.y = p.y + p.h; player.vy = 0;
                        }
                    }
                    pRect.y = player.y;
                }
            }

            if (player.shootCooldown > 0) player.shootCooldown--;
            if (isShooting && currentShop == null) shoot(); 

            let targetCameraX = player.x - 960 / 2 + player.width / 2;
            let targetCameraY = player.y - 480 / 2 + player.height / 2;
            cameraX += (targetCameraX - cameraX) * 0.1;
            cameraY += (targetCameraY - cameraY) * 0.1;

            // 투사체 처리
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx; b.y += b.vy; b.life--;

                let hitWall = false;
                if (player.stats.wallPierce === 0) {
                    for (let p of platforms) {
                        if (p.isOneWay) continue; 
                        if (checkCollision({x: b.x - b.radius, y: b.y - b.radius, w: b.radius*2, h: b.radius*2}, p)) { hitWall = true; break; }
                    }
                }
                if (hitWall) { spawnParticles(b.x, b.y, "#94a3b8", 3); bullets.splice(i, 1); continue; }

                let hitEnemy = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    let e = enemies[j];
                    if (e.dead || b.hitSet.has(e)) continue;
                    if (checkCollision({x: b.x - b.radius, y: b.y - b.radius, w: b.radius*2, h: b.radius*2}, e)) {
                        e.hp -= b.damage; b.hitSet.add(e);
                        e.flashTimer = 6; 
                        spawnFloatingText(e.x + e.w/2, e.y - 5, b.damage, e.isBoss ? "#facc15" : "#ffffff");
                        spawnParticles(b.x, b.y, b.color, 4); sfx.hit();
                        if (b.type !== "PIERCE") hitEnemy = true;
                        if (e.hp <= 0) e.dead = true;
                        break;
                    }
                }
                if (hitEnemy || b.life <= 0) bullets.splice(i, 1);
            }

            // 적 AI 로직 루프
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                if (e.dead) continue;
                if (e.flashTimer > 0) e.flashTimer--;

                // 말풍선 수명 감소 처리
                if (e.chatTimer && e.chatTimer > 0) {
                    e.chatTimer--;
                    if (e.chatTimer <= 0) e.chatText = null;
                }

                let dx = (player.x + player.width/2) - (e.x + e.w/2);
                let dy = (player.y + player.height/2) - (e.y + e.h/2);
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                let aggroRange = e.isBoss ? 800 : 400;
                if (e.type === "FLYER") aggroRange = 300;
                else if (e.type === "TANK") aggroRange = 250;

                if (e.type !== "FLYER") e.vy += GRAVITY;

                if (e.state === "ROAM") {
                    let detectDy = (e.type === "RANGED" || e.type === "BOMBER" || e.isBoss) ? 600 : 200;
                    if (dist < aggroRange && (e.type === "FLYER" || Math.abs(dy) < detectDy)) { 
                        if (e.type === "DASHER" || e.type === "BOSS_DASHER") { e.state = "WINDUP"; e.timer = (e.type === "BOSS_DASHER") ? 20 : 30; e.vx = 0; } 
                        else { e.state = "HOSTILE"; e.timer = 0; }
                    } else {
                        e.roamTimer--;
                        if (e.roamTimer <= 0) { e.roamDir *= -1; e.roamTimer = 60 + Math.random() * 60; }
                        if (e.type === "FLYER") { e.vx = e.roamDir * 0.7; e.vy = Math.sin(e.roamTimer * 0.1) * 0.35; if (Math.abs(e.x - e.spawnX) > 150) e.roamDir *= -1; } 
                        else if (e.type === "TANK") e.vx = e.roamDir * 0.2; 
                        else e.vx = e.roamDir * 0.4; 

                        if (e.grounded && e.type !== "FLYER") {
                            let hasFloor = false; let checkX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2; let checkY = e.y + e.h + 2;
                            for (let p of platforms) { if (checkCollision({x: checkX, y: checkY, w: 1, h: 1}, p)) { hasFloor = true; break; } }
                            if (!hasFloor) { e.roamDir *= -1; e.vx = e.roamDir * (e.type === "TANK" ? 0.2 : 0.4); }
                        }
                    }
                } else if (e.state === "HOSTILE") {
                    if (dist > aggroRange + 150) { e.state = "ROAM"; } 
                    else {
                        e.timer++; let dirToPlayer = dx > 0 ? 1 : -1;
                        if (e.type === "TANK") e.vx = dirToPlayer * 0.3;
                        else if (e.type === "FLYER") { let angle = Math.atan2(dy, dx); e.vx = Math.cos(angle) * 1.0; e.vy = Math.sin(angle) * 1.0; } 
                        else if (e.type.includes("RANGED") || e.type.includes("BOMBER")) {
                            let attackRange = e.type.includes("RANGED") ? 250 : 300;
                            if (dist < 150) e.vx = -dirToPlayer * 0.5;
                            else if (dist > attackRange) e.vx = dirToPlayer * 0.5;
                            else e.vx = Math.sin(e.timer * 0.05) * 0.6;

                            if (e.grounded) {
                                let hasFloor = false; let checkX = e.vx > 0 ? e.x + e.w + 2 : e.x - 2; let checkY = e.y + e.h + 2;
                                for (let p of platforms) { if (checkCollision({x: checkX, y: checkY, w: 1, h: 1}, p)) { hasFloor = true; break; } }
                                if (!hasFloor && dist <= attackRange) e.vx = 0; 
                            }

                            e.cooldown--;
                            if (e.cooldown <= 0) {
                                let angle = Math.atan2(dy, dx);
                                if (e.type === "RANGED") { createBullet(enemyBullets, e.x + e.w/2, e.y + e.h/2, angle, "NORMAL", 1.8, "#f87171", false, 10, 4); e.cooldown = 110; } 
                                else if (e.type === "BOSS_RANGED") {
                                    createBullet(enemyBullets, e.x + e.w/2, e.y + e.h/2, angle - 0.2, "NORMAL", 2.5, "#d8b4fe", false, 15, 6); 
                                    createBullet(enemyBullets, e.x + e.w/2, e.y + e.h/2, angle, "NORMAL", 2.5, "#d8b4fe", false, 15, 6); 
                                    createBullet(enemyBullets, e.x + e.w/2, e.y + e.h/2, angle + 0.2, "NORMAL", 2.5, "#d8b4fe", false, 15, 6); 
                                    e.cooldown = 50; 
                                } else if (e.type === "BOMBER") {
                                    let t = 60; let neededVx = dx / t; let neededVy = (dy - 0.5 * GRAVITY * t * t) / t; 
                                    neededVx = Math.min(Math.max(neededVx, -4.5), 4.5); neededVy = Math.min(Math.max(neededVy, -9), -1.5);
                                    enemyBullets.push({ x: e.x + e.w/2, y: e.y, vx: neededVx, vy: neededVy, radius: 6, color: "#84cc16", type: "BOMB", life: 180, isPlayer: false, damage: 15 });
                                    e.cooldown = 130;
                                } else if (e.type === "BOSS_BOMBER") {
                                    let t = 60; let neededVx = dx / t; let neededVy = (dy - 0.5 * GRAVITY * t * t) / t; 
                                    neededVx = Math.min(Math.max(neededVx, -6), 6); neededVy = Math.min(Math.max(neededVy, -10.5), -1.5);
                                    for(let bOffset = -1; bOffset <= 1; bOffset++) {
                                        enemyBullets.push({ x: e.x + e.w/2, y: e.y, vx: neededVx + bOffset * 1.5, vy: neededVy - Math.abs(bOffset) * 0.75, radius: 8, color: "#bef264", type: "BOMB", life: 240, isPlayer: false, damage: 20 });
                                    }
                                    e.cooldown = 100;
                                }
                            }
                        }
                    }
                } else if (e.state === "WINDUP") {
                    e.timer--; e.vx = (e.timer % 4 < 2) ? 0.7 : -0.7;
                    if (e.timer <= 0) {
                        e.state = "DASHING"; let t = (e.type === "BOSS_DASHER") ? 35 : 50; let neededVx = dx / t; let neededVy = (dy - 0.5 * GRAVITY * t * t) / t; 
                        if (e.type === "BOSS_DASHER") { e.vx = Math.min(Math.max(neededVx, -9), 9); e.vy = Math.min(Math.max(neededVy, -9), 2); e.timer = 50; } 
                        else { e.vx = Math.min(Math.max(neededVx, -5), 5); e.vy = Math.min(Math.max(neededVy, -7), 2); e.timer = 65; }
                        e.grounded = false;
                    }
                } else if (e.state === "DASHING") {
                    e.timer--; let peRect = {x: player.x, y: player.y, w: player.width, h: player.height};
                    if (checkCollision(peRect, e)) takeDamage(e.type === "BOSS_DASHER" ? 25 : 15);
                    if (Math.random() > 0.5) spawnParticles(e.x + e.w/2, e.y + e.h, "#fb923c", 1);
                    if (e.grounded || e.timer <= 0) { e.state = "COOLDOWN"; e.timer = 40; e.vx = 0; }
                } else if (e.state === "COOLDOWN") {
                    e.timer--; e.vx = 0; if (e.timer <= 0) e.state = "ROAM";
                }

                if (e.type !== "FLYER") {
                    e.x += e.vx;
                    for (let p of platforms) {
                        if (p.isOneWay) continue; 
                        if (checkCollision({x: e.x, y: e.y, w: e.w, h: e.h}, p)) {
                            if (e.vx > 0) e.x = p.x - e.w; if (e.vx < 0) e.x = p.x + p.w; if (e.state === "ROAM") e.roamDir *= -1;
                        }
                    }
                    e.y += e.vy; e.grounded = false;
                    for (let p of platforms) {
                        if (checkCollision({x: e.x, y: e.y, w: e.w, h: e.h}, p)) {
                            if (p.isOneWay) { if (e.vy > 0 && (e.y - e.vy + e.h <= p.y + 15)) { e.y = p.y - e.h; e.vy = 0; e.grounded = true; } } 
                            else { if (e.vy > 0) { e.y = p.y - e.h; e.vy = 0; e.grounded = true; } else if (e.vy < 0) { e.y = p.y + p.h; e.vy = 0; } }
                        }
                    }
                } else { e.x += e.vx; e.y += e.vy; }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                let b = enemyBullets[i];
                if (b.type === "BOMB") b.vy += GRAVITY;
                b.x += b.vx; b.y += b.vy; b.life--;
                
                let hitWall = false;
                for (let p of platforms) {
                    if (p.isOneWay) continue;
                    if (checkCollision({x: b.x - b.radius, y: b.y - b.radius, w: b.radius*2, h: b.radius*2}, p)) { hitWall = true; break; }
                }
                if (hitWall) {
                    if (b.type === "BOMB") { sfx.explosion(); spawnParticles(b.x, b.y, "#84cc16", 15); triggerScreenShake(5, 10); } 
                    else spawnParticles(b.x, b.y, "#94a3b8", 3);
                    enemyBullets.splice(i, 1); continue;
                }
                let bRect = {x: b.x - b.radius, y: b.y - b.radius, w: b.radius*2, h: b.radius*2};
                if (checkCollision(pRect, bRect)) { takeDamage(b.damage || 10); enemyBullets.splice(i, 1); continue; }
                if (b.life <= 0) enemyBullets.splice(i, 1);
            }

            for (let i = drops.length - 1; i >= 0; i--) {
                let d = drops[i]; d.vy += GRAVITY; d.x += d.vx;
                for (let p of platforms) { if (p.isOneWay) continue; if (checkCollision(d, p)) { d.x -= d.vx; d.vx *= -0.5; break; } }
                d.y += d.vy;
                for (let p of platforms) {
                    if (checkCollision(d, p)) {
                        if (p.isOneWay) { if (d.vy > 0 && d.y - d.vy + d.h <= p.y + 15) { d.y = p.y - d.h; d.vy *= -0.4; d.vx *= 0.8; } } 
                        else { if (d.vy > 0) { d.y = p.y - d.h; d.vy *= -0.4; d.vx *= 0.8; } else if (d.vy < 0) { d.y = p.y + p.h; d.vy *= -0.5; } }
                    }
                }
                d.life--;
                if (checkCollision(pRect, d)) { player.gold += d.amount; sfx.coin(); spawnParticles(d.x, d.y, "#fbbf24", 5); if (currentShop) updateShopUI(); drops.splice(i, 1); continue; }
                if (d.life <= 0 || d.y > player.y + 1000) drops.splice(i, 1);
            }

            for (let item of items) {
                if (!item.picked && checkCollision(pRect, item)) { item.picked = true; applyUpgrade(item.type); spawnParticles(item.x + 10, item.y + 10, item.color, 20); }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.life--; if (p.life <= 0) particles.splice(i, 1);
            }

            let goldGained = false;
            for (let i = enemies.length - 1; i >= 0; i--) {
                if (enemies[i].dead) {
                    let e = enemies[i]; sfx.explosion(); triggerScreenShake(e.isBoss ? 12 : 3, e.isBoss ? 24 : 8);
                    spawnParticles(e.x + e.w/2, e.y + e.h/2, e.color, e.isBoss ? 50 : 15);
                    
                    let totalGold = 10;
                    if (e.isBoss) totalGold = 100; else if (e.type === "TANK") totalGold = 25; else if (e.type === "DASHER") totalGold = 15; else if (e.type === "BOMBER") totalGold = 12;
                    let numSmallCoins = e.isBoss ? 8 : (Math.floor(Math.random() * 2) + 2); let bigGoldValue = totalGold - numSmallCoins;

                    drops.push({ chunkKey: e.chunkKey, x: e.x + e.w/2 - 6, y: e.y + e.h/2 - 6, vx: (Math.random() - 0.5) * 2, vy: -1.5 - Math.random() * 1.5, w: 12, h: 12, amount: bigGoldValue, life: 600, color: "#f59e0b" });
                    for (let k = 0; k < numSmallCoins; k++) {
                        drops.push({ chunkKey: e.chunkKey, x: e.x + e.w/2 - 3, y: e.y + e.h/2 - 3, vx: (Math.random() - 0.5) * 8, vy: -3 - Math.random() * 4, w: 6, h: 6, amount: 1, life: 600, color: "#fcd34d" });
                    }
                    if (e.isBoss) items.push({ chunkKey: e.chunkKey, x: e.x, y: e.y, w: 20, h: 20, type: "SPEC_HP", picked: false, color: "#a855f7" });
                    enemiesKilled++; enemies.splice(i, 1);
                }
            }
        }

        // ==========================================
        // 렌더링 및 디테일 연출 고도화
        // ==========================================
        function drawPlatforms() {
            for (let p of platforms) {
                if (p.x + p.w < cameraX || p.x > cameraX + 960 || p.y + p.h < cameraY || p.y > cameraY + 480) continue;
                
                if (p.isOneWay) {
                    ctx.fillStyle = p.isLocked ? "rgba(239, 68, 68, 0.4)" : "rgba(56, 189, 248, 0.35)";
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.fillStyle = p.isLocked ? "#ef4444" : "#0ea5e9";
                    ctx.fillRect(p.x, p.y, p.w, 4);
                    
                    // 레이저 무늬 디테일
                    ctx.strokeStyle = p.isLocked ? "rgba(239, 68, 68, 0.6)" : "rgba(56, 189, 248, 0.6)";
                    ctx.lineWidth = 1;
                    for (let lx = p.x + 10; lx < p.x + p.w; lx += 20) {
                        ctx.beginPath(); ctx.moveTo(lx, p.y + 4); ctx.lineTo(lx - 5, p.y + p.h); ctx.stroke();
                    }
                } else {
                    // 아케이드 스타일 그리드 벽돌 무늬 드로잉
                    ctx.fillStyle = p.isRoundFloor ? "#10101c" : "#1e1e24";
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.fillStyle = p.isRoundFloor ? "#2a2a40" : "#334155";
                    ctx.fillRect(p.x, p.y, p.w, 4); 
                    
                    // 디테일 패턴 선 추가
                    ctx.strokeStyle = p.isRoundFloor ? "#1e1e2f" : "#2d3748";
                    ctx.lineWidth = 1;
                    for(let bx = p.x + 16; bx < p.x + p.w; bx += 24) {
                        ctx.beginPath(); ctx.moveTo(bx, p.y + 4); ctx.lineTo(bx, p.y + p.h); ctx.stroke();
                    }
                }
            }
        }

        function drawBackground() {
            // 패럴랙스 스크롤 연산 적용 배경 드로잉
            ctx.fillStyle = "#07070a";
            ctx.fillRect(0, 0, 960, 480);
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            for (let star of bgStars) {
                // 카메라 좌표축 뎁스 스케일링 보정
                let sx = (star.x - cameraX * star.depth) % 960;
                let sy = (star.y - cameraY * star.depth) % 480;
                if (sx < 0) sx += 960;
                if (sy < 0) sy += 480;
                ctx.fillStyle = star.color;
                ctx.fillRect(sx, sy, star.size, star.size);
            }
        }

        function drawHUD() {
            // 아케이드 전용 인게임 HUD 박스 렌더링 (사선 깎인 사이버 스타일)
            ctx.save();
            ctx.fillStyle = "rgba(8, 8, 12, 0.88)";
            ctx.strokeStyle = "rgba(99, 102, 241, 0.45)";
            ctx.lineWidth = 1.5;
            
            ctx.beginPath();
            ctx.moveTo(10, 10);
            ctx.lineTo(260, 10);
            ctx.lineTo(270, 20);
            ctx.lineTo(270, 120);
            ctx.lineTo(20, 120);
            ctx.lineTo(10, 110);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            
            // 데코 레이어 데칼 선
            ctx.strokeStyle = "rgba(99, 102, 241, 0.85)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(10, 22);
            ctx.lineTo(10, 100);
            ctx.stroke();
            
            let activeChar = characters[currentCharIndex];
            let currentRound = Math.max(1, Math.floor(player.y / CHUNK_H) + 1);

            // 텍스트 인포 데코레이션 (GAME OVER 텍스트 스타일 적용)
            ctx.save();
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            // STAGE 타이틀 그리기 (네온 cyan-indigo 그라데이션)
            ctx.shadowColor = "rgba(6, 182, 212, 0.85)";
            ctx.shadowBlur = 12;
            let stageGrad = ctx.createLinearGradient(22, 18, 240, 18);
            stageGrad.addColorStop(0, "#00f0ff");
            stageGrad.addColorStop(1, "#7000ff");
            ctx.fillStyle = stageGrad;
            ctx.font = "900 15px 'Orbitron', sans-serif";
            ctx.fillText(`STAGE R-${currentRound} [${activeChar.name}]`, 22, 32);
            
            // GOLD / KILLS 정보 그리기 (네온 gold-orange 그라데이션)
            ctx.shadowColor = "rgba(251, 191, 36, 0.8)";
            ctx.shadowBlur = 10;
            let goldGrad = ctx.createLinearGradient(22, 40, 220, 40);
            goldGrad.addColorStop(0, "#ffe600");
            goldGrad.addColorStop(1, "#ff9900");
            ctx.fillStyle = goldGrad;
            ctx.font = "900 11px 'Orbitron', sans-serif";
            ctx.fillText(`GOLD: ${player.gold}G  |  KILLS: ${enemiesKilled}`, 22, 49);
            ctx.restore();

            // HP 바
            ctx.fillStyle = "rgba(255, 255, 255, 0.06)";
            ctx.fillRect(22, 59, 150, 12);
            let hpRatio = Math.max(player.hp, 0) / player.maxHp;
            let hpGrad = ctx.createLinearGradient(22, 0, 172, 0);
            hpGrad.addColorStop(0, "#ff2a5f");
            hpGrad.addColorStop(1, "#be002c");
            ctx.fillStyle = hpGrad;
            ctx.fillRect(22, 59, 150 * hpRatio, 12);
            
            ctx.save();
            ctx.shadowColor = "rgba(255, 42, 95, 0.6)";
            ctx.shadowBlur = 4;
            ctx.fillStyle = "#ffffff";
            ctx.font = "bold 8.5px 'Orbitron', sans-serif";
            ctx.fillText(`HP ${Math.max(player.hp, 0)}/${player.maxHp}`, 26, 68);
            ctx.restore();

            // 제트팩 체공 바
            ctx.fillStyle = "rgba(255, 255, 255, 0.06)";
            ctx.fillRect(22, 78, 150, 6);
            let hoverRatio = player.hoverGauge / player.maxHoverGauge;
            let jetGrad = ctx.createLinearGradient(22, 0, 172, 0);
            jetGrad.addColorStop(0, "#00f0ff");
            jetGrad.addColorStop(1, "#00a8cc");
            ctx.fillStyle = jetGrad;
            ctx.fillRect(22, 78, 150 * hoverRatio, 6);

            // 업그레이드 약식 목록
            ctx.save();
            ctx.shadowColor = "rgba(99, 102, 241, 0.5)";
            ctx.shadowBlur = 5;
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "bold 8.5px 'Orbitron', sans-serif";
            ctx.fillText(`UPGRADE: R:${player.stats.rapid} S:${player.stats.spread} P:${player.stats.power} J:${player.stats.jump} H:${player.stats.hover} W:${player.stats.wallPierce}`, 22, 102);
            ctx.restore();
            
            ctx.restore();
        }

        function drawOffScreenIndicators() {
            // 시야 밖 보스 위치 방향 알림 UI 렌더링
            for (let e of enemies) {
                if (e.isBoss && !e.dead) {
                    let screenX = e.x + e.w/2 - cameraX;
                    let screenY = e.y + e.h/2 - cameraY;

                    // 화면 내에 있으면 오프스크린 마커 미표시
                    if (screenX >= 0 && screenX <= 960 && screenY >= 0 && screenY <= 480) continue;

                    let edgeX = Math.min(Math.max(screenX, 20), 940);
                    let edgeY = Math.min(Math.max(screenY, 20), 460);

                    ctx.fillStyle = "#ef4444";
                    ctx.beginPath();
                    ctx.arc(edgeX, edgeY, 7, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = "#ffffff"; ctx.font = "bold 9px Arial"; ctx.textAlign = "center";
                    ctx.fillText("⚠️", edgeX, edgeY + 3);
                    ctx.textAlign = "left"; // 정렬 원복
                }
            }
        }

        function drawCrosshair() {
            if (joysticks.right.active) return; // 모바일 조이스틱 활성화 시 미표시
            
            ctx.save();
            ctx.translate(mouse.x, mouse.y);
            ctx.strokeStyle = player.shootCooldown > 0 ? "rgba(239, 68, 68, 0.6)" : "rgba(34, 197, 94, 0.8)";
            ctx.lineWidth = 1.5;

            // 조준점 외곽 링
            ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.stroke();
            // 십자 에임 크로스선
            ctx.beginPath(); ctx.moveTo(-12, 0); ctx.lineTo(-4, 0); ctx.moveTo(4, 0); ctx.lineTo(12, 0);
            ctx.moveTo(0, -12); ctx.lineTo(0, -4); ctx.moveTo(0, 4); ctx.lineTo(0, 12); ctx.stroke();

            // 원형 재장전 쿨타임 UI 인디케이터
            if (player.shootCooldown > 0) {
                let charData = characters[currentCharIndex];
                let maxCd = charData.baseCooldown - (player.stats.rapid * 2);
                if (maxCd < 16) maxCd = 16;
                let cdProgress = player.shootCooldown / maxCd;

                ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, 12, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * cdProgress));
                ctx.stroke();
            }
            ctx.restore();
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const targetWidth = Math.round(rect.width * dpr);
            const targetHeight = Math.round(rect.height * dpr);
            
            if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
                canvas.width = targetWidth;
                canvas.height = targetHeight;
                ctx.imageSmoothingEnabled = false; // 픽셀 아트 고유의 외곽선 선명도 보존
            }
        }

        function draw() {
            resizeCanvas();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save(); // 최외곽 기기 물리 DPI 대응 고해상도 스케일 보정
            const scaleX = canvas.width / 960;
            const scaleY = canvas.height / 480;
            ctx.scale(scaleX, scaleY);
            
            ctx.save();
            // 화면 흔들림(Screen Shake) 카메라 좌표 왜곡 연산 적용
            if (shakeTimer > 0) {
                let dx = (Math.random() - 0.5) * shakeMagnitude;
                let dy = (Math.random() - 0.5) * shakeMagnitude;
                ctx.translate(dx, dy);
            }

            drawBackground();
            
            ctx.save();
            ctx.translate(-cameraX, -cameraY);

            drawPlatforms();
            for (let s of shops) {
                // 상점 본체 (어두운 아케이드 기기 느낌)
                ctx.fillStyle = "#1e293b"; 
                ctx.fillRect(s.x, s.y, s.w, s.h);
                
                // 노란색 네온 테두리 포인트
                ctx.strokeStyle = "#eab308"; 
                ctx.lineWidth = 2;
                ctx.strokeRect(s.x, s.y, s.w, s.h);
                
                // SHOP 간판 텍스트
                ctx.save();
                ctx.shadowColor = "rgba(250, 204, 21, 0.85)";
                ctx.shadowBlur = 8;
                ctx.fillStyle = "#facc15"; 
                ctx.font = "900 13px 'Orbitron', sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("SHOP", s.x + s.w / 2, s.y + 20);
                ctx.restore();
                ctx.textAlign = "left"; // 다른 텍스트 렌더링을 위해 정렬 원상복구
                
                // 기기 중앙 화면 디테일
                ctx.fillStyle = "#0f172a";
                ctx.fillRect(s.x + 8, s.y + 28, s.w - 16, s.h - 36);
                
                // 화면 속 깜빡이는 포인트 효과 (살아있는 상점 느낌 추가)
                if (Math.floor(Date.now() / 500) % 2 === 0) {
                    ctx.fillStyle = "#38bdf8";
                    ctx.fillRect(s.x + s.w / 2 - 4, s.y + 36, 8, 8);
                }
            }
            for (let item of items) {
                if (!item.picked) {
                    ctx.fillStyle = item.color; ctx.fillRect(item.x, item.y, item.w, item.h);
                    // 빛나는 네온 박스 효과 연출 추가
                    ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1; ctx.strokeRect(item.x, item.y, item.w, item.h);
                    ctx.fillStyle = "#ffffff"; ctx.font = "bold 9px monospace"; 
                    ctx.fillText(item.type.includes("RAPID") ? "R" : (item.type.includes("SPREAD") ? "S" : "P"), item.x + 7, item.y + 14);
                }
            }

            for (let d of drops) {
                if (d.life < 60 && Math.floor(d.life / 5) % 2 === 0) continue; 
                ctx.fillStyle = d.color; ctx.fillRect(d.x, d.y, d.w, d.h);
                ctx.fillStyle = "#ffffff"; ctx.fillRect(d.x+1, d.y+1, d.w-2, d.h-2);
            }

            // 에너미 및 보스 렌더링 + 화이트 플래시 연출
            for (let e of enemies) {
                if (e.dead) continue;
                if (e.flashTimer > 0) {
                    ctx.fillStyle = "#ffffff"; // 피격 시 순백색 렌더링으로 타격감 극대화
                } else {
                    ctx.fillStyle = e.color;
                }
                ctx.fillRect(e.x, e.y, e.w, e.h);
                
                if (e.isBoss) {
                    ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2; ctx.strokeRect(e.x, e.y, e.w, e.h);
                }
                ctx.fillStyle = "#1e293b"; ctx.fillRect(e.x, e.y - 8, e.w, 3);
                ctx.fillStyle = e.isBoss ? "#eab308" : "#22c55e"; 
                ctx.fillRect(e.x, e.y - 8, e.w * (e.hp / e.maxHp), 3);

                // 말풍선(치지직 채팅) 렌더링
                if (e.chatText && e.chatTimer > 0) {
                    ctx.save();
                    ctx.font = "bold 9px 'Orbitron', sans-serif";
                    let textWidth = ctx.measureText(e.chatText).width;
                    let bubbleW = Math.max(textWidth + 14, 40);
                    let bubbleH = 16;
                    let bubbleX = e.x + e.w/2 - bubbleW/2;
                    let bubbleY = e.y - bubbleH - 12;

                    ctx.fillStyle = "rgba(10, 10, 15, 0.85)";
                    ctx.strokeStyle = e.color || "#ffffff";
                    ctx.lineWidth = 1;
                    ctx.shadowColor = e.color || "#ffffff";
                    ctx.shadowBlur = 4;

                    drawRoundRect(ctx, bubbleX, bubbleY, bubbleW, bubbleH, 4);
                    ctx.fill();
                    ctx.stroke();

                    // 말풍선 꼬리
                    ctx.beginPath();
                    ctx.moveTo(e.x + e.w/2 - 4, bubbleY + bubbleH);
                    ctx.lineTo(e.x + e.w/2 + 4, bubbleY + bubbleH);
                    ctx.lineTo(e.x + e.w/2, bubbleY + bubbleH + 4);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // 텍스트 그리기
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = "#ffffff";
                    ctx.textAlign = "center";
                    ctx.fillText(e.chatText, e.x + e.w/2, bubbleY + 11);
                    ctx.restore();
                }
            }

            // 아군 렌더링 + 피격 플래시 연출
            let activeChar = characters[currentCharIndex];
            if (player.invulnerable <= 0 || Math.floor(player.invulnerable / 5) % 2 === 0) {
                ctx.fillStyle = player.flashTimer > 0 ? "#ffffff" : activeChar.color;
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            // 플레이어 말풍선 렌더링
            if (player.chatText && player.chatTimer > 0) {
                ctx.save();
                ctx.font = "bold 9px 'Orbitron', sans-serif";
                let textWidth = ctx.measureText(player.chatText).width;
                let bubbleW = Math.max(textWidth + 14, 40);
                let bubbleH = 16;
                let bubbleX = player.x + player.width/2 - bubbleW/2;
                let bubbleY = player.y - bubbleH - 12;

                ctx.fillStyle = "rgba(10, 10, 15, 0.85)";
                ctx.strokeStyle = activeChar.color || "#ffffff";
                ctx.lineWidth = 1;
                ctx.shadowColor = activeChar.color || "#ffffff";
                ctx.shadowBlur = 4;

                drawRoundRect(ctx, bubbleX, bubbleY, bubbleW, bubbleH, 4);
                ctx.fill();
                ctx.stroke();

                // 말풍선 꼬리
                ctx.beginPath();
                ctx.moveTo(player.x + player.width/2 - 4, bubbleY + bubbleH);
                ctx.lineTo(player.x + player.width/2 + 4, bubbleY + bubbleH);
                ctx.lineTo(player.x + player.width/2, bubbleY + bubbleH + 4);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 텍스트 그리기
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#ffffff";
                ctx.textAlign = "center";
                ctx.fillText(player.chatText, player.x + player.width/2, bubbleY + 11);
                ctx.restore();
            }

            // 투사체 구체 렌더링
            for (let b of bullets) {
                ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill();
            }
            for (let b of enemyBullets) {
                ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill();
            }
            for (let p of particles) {
                ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 2, 2);
            }

            // 플로팅 데미지 텍스트 렌더링
            for (let t of damageTexts) {
                ctx.save();
                ctx.globalAlpha = t.alpha;
                ctx.fillStyle = t.color;
                ctx.font = "900 13px 'Orbitron', sans-serif";
                ctx.shadowColor = t.color; ctx.shadowBlur = 6;
                ctx.fillText(t.text, t.x, t.y);
                ctx.restore();
            }

            ctx.restore(); // camera coordinate out
            ctx.restore(); // screen shake out

            // 인터페이스 캔버스 고정 레이어 영역
            drawHUD();
            drawOffScreenIndicators();
            drawCrosshair();

            // 가상 조이스틱 모바일 고정 레이어 연출
            ctx.globalAlpha = 0.35;
            if (joysticks.left.active) {
                ctx.beginPath(); ctx.arc(joysticks.left.originX, joysticks.left.originY, 60, 0, Math.PI*2); ctx.fillStyle = "#ffffff"; ctx.fill();
                ctx.beginPath(); ctx.arc(joysticks.left.x, joysticks.left.y, 25, 0, Math.PI*2); ctx.fillStyle = "#2563eb"; ctx.fill();
            }
            if (joysticks.right.active) {
                ctx.beginPath(); ctx.arc(joysticks.right.originX, joysticks.right.originY, 60, 0, Math.PI*2); ctx.fillStyle = "#ffffff"; ctx.fill();
                ctx.beginPath(); ctx.arc(joysticks.right.x, joysticks.right.y, 25, 0, Math.PI*2); ctx.fillStyle = "#dc2626"; ctx.fill();
            }
            ctx.globalAlpha = 1.0;
            
            ctx.restore(); // 고해상도 매핑 스케일 restore
        }

        function loop() {
            if (gameActive) update();
            draw();
            requestAnimationFrame(loop);
        }

        // 둥근 사각형 그리기 헬퍼 함수
        function drawRoundRect(ctx, x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        // ==========================================
        // 치지직 채팅 연동 시스템 (5중 폴백 무설정 CORS 프록시 아키텍처)
        // ==========================================
        let chzzkSocket = null;
        let chzzkPingInterval = null;

        // CORS 우회가 필요 없는 오픈소스/무료 프록시 폴백 체인
        function fetchChzzkData(url) {
            const timeout = 4000; // 각 프록시 서버당 4초 타임아웃
            
            const fetchWithTimeout = (proxyUrl, parseFn) => {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), timeout);
                
                return fetch(proxyUrl, { signal: controller.signal })
                    .then(res => {
                        clearTimeout(id);
                        if (!res.ok) throw new Error(`HTTP status ${res.status}`);
                        return parseFn(res);
                    })
                    .catch(err => {
                        clearTimeout(id);
                        throw err;
                    });
            };

            // 프록시 목록 및 파싱 방법 설정
            const proxyChain = [
                // 1순위: corsproxy.io (가장 보편적)
                {
                    name: "corsproxy.io",
                    url: `https://corsproxy.io/?${encodeURIComponent(url)}`,
                    parse: res => res.json()
                },
                // 2순위: allorigins (JSON Wrapping)
                {
                    name: "allorigins JSON",
                    url: `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
                    parse: res => res.json().then(data => JSON.parse(data.contents))
                },
                // 3순위: allorigins RAW
                {
                    name: "allorigins RAW",
                    url: `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                    parse: res => res.json()
                },
                // 4순위: codetabs (인코딩 우회 적용)
                {
                    name: "codetabs",
                    url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
                    parse: res => res.json()
                },
                // 5순위: jsonp.afeld.me
                {
                    name: "afeld.me",
                    url: `https://jsonp.afeld.me/?url=${encodeURIComponent(url)}`,
                    parse: res => res.json()
                }
            ];

            // 순차적으로 프록시 실행하는 재귀 체인
            const tryProxy = (index) => {
                if (index >= proxyChain.length) {
                    return Promise.reject(new Error("모든 우회 프록시 서버 연결에 실패했습니다. 프록시 서버가 혼잡하거나 네트워크 연결 상태가 불안정합니다. 잠시 후 다시 시도해 주세요."));
                }
                
                const proxy = proxyChain[index];
                console.log(`[CORS Proxy Try] ${proxy.name} 경유 호출 시도 중...`);
                
                return fetchWithTimeout(proxy.url, proxy.parse)
                    .then(data => {
                        // 네이버 API가 반환한 유효성 검증
                        // 성공했을 때 code가 200이거나 content 오브젝트가 존재해야 함
                        if (data && (data.code === 200 || data.content !== undefined)) {
                            console.log(`[CORS Proxy Success] ${proxy.name} 연동 성공`);
                            return data;
                        } else {
                            // 프록시 자체는 통과했으나 네이버에서 차단하여 403 HTML 등을 응답한 경우
                            throw new Error("Naver API invalid data response");
                        }
                    })
                    .catch(err => {
                        console.warn(`[CORS Proxy Failed] ${proxy.name} 실패: ${err.message}. 다음 폴백 실행...`);
                        return tryProxy(index + 1);
                    });
            };

            return tryProxy(0);
        }

        function connectChzzk(channelId) {
            if (chzzkSocket) {
                chzzkSocket.close();
                clearInterval(chzzkPingInterval);
            }
            
            addSystemLog("치지직 채널 정보 조회 중...");
            
            let detailUrl = `https://api.chzzk.naver.com/service/v2/channels/${channelId}/live-detail`;
            
            fetchChzzkData(detailUrl)
                .then(data => {
                    let liveDetail = data.content;
                    if (!liveDetail) throw new Error("채널이 존재하지 않거나 라이브 정보를 찾을 수 없습니다.");
                    let chatChannelId = liveDetail.chatChannelId;
                    if (!chatChannelId) throw new Error("채팅 채널 ID를 획득하지 못했습니다.");
                    
                    addSystemLog("채팅 서버 토큰 발급 중...");
                    let tokenUrl = `https://comm-api.game.naver.com/nng_main/v1/chats/access-token?channelId=${chatChannelId}&chatType=STREAMING`;
                    
                    return fetchChzzkData(tokenUrl).then(tokenData => {
                        return {
                            chatChannelId: chatChannelId,
                            accessToken: tokenData.content.accessToken,
                            extraToken: tokenData.content.extraToken,
                            chatServerList: tokenData.content.chatServerList
                        };
                    });
                })
                .then(connInfo => {
                    addSystemLog("웹소켓 채팅 서버 연결 중...");
                    let wsUrl = connInfo.chatServerList && connInfo.chatServerList.length > 0 ? connInfo.chatServerList[0] : "wss://kr-ss1.chat.naver.com/chat";
                    chzzkSocket = new WebSocket(wsUrl);
                    
                    chzzkSocket.onopen = () => {
                        addSystemLog("연동 인증 전송 중...");
                        let connectMsg = {
                            "ver": "2",
                            "cmd": 100,
                            "svcid": "game",
                            "cid": connInfo.chatChannelId,
                            "sid": null,
                            "bdy": {
                                "uid": null,
                                "devType": 2001,
                                "accTkn": connInfo.accessToken,
                                "auth": "READ"
                            },
                            "tid": 1
                        };
                        chzzkSocket.send(JSON.stringify(connectMsg));
                        
                        chzzkPingInterval = setInterval(() => {
                            if (chzzkSocket && chzzkSocket.readyState === WebSocket.OPEN) {
                                chzzkSocket.send(JSON.stringify({ "ver": "2", "cmd": 0 }));
                            }
                        }, 20000);
                    };
                    
                    chzzkSocket.onmessage = (event) => {
                        try {
                            let msg = JSON.parse(event.data);
                            if (msg.cmd === 10100) {
                                addSystemLog("연동 완료! 채팅 수신 중 🟢");
                                updateChzzkUIStatus(true);
                            } else if (msg.cmd === 93006) {
                                if (msg.bdy && msg.bdy.chatList) {
                                    for (let chatItem of msg.bdy.chatList) {
                                        handleReceivedChat(chatItem.msg);
                                    }
                                }
                            }
                        } catch(e) {
                            console.error("치지직 메시지 파싱 에러:", e);
                        }
                    };
                    
                    chzzkSocket.onerror = (err) => {
                        console.error("치지직 웹소켓 에러:", err);
                        addSystemLog("채팅 서버 연결 오류.");
                        updateChzzkUIStatus(false);
                    };
                    
                    chzzkSocket.onclose = () => {
                        addSystemLog("연동 연결이 해제되었습니다. 🔴");
                        updateChzzkUIStatus(false);
                        clearInterval(chzzkPingInterval);
                    };
                })
                .catch(err => {
                    console.error(err);
                    addSystemLog(`연동 실패: ${err.message}`);
                    alert(`치지직 채팅 연동에 실패했습니다.\n사유: ${err.message}\n(채널 ID가 올바른지 다시 확인해주세요.)`);
                    updateChzzkUIStatus(false);
                });
        }

        function handleReceivedChat(message) {
            let aliveEnemies = enemies.filter(e => !e.dead);
            if (aliveEnemies.length > 0) {
                // 살아있는 적이 있다면 무작위 적 1마리가 말함
                let target = aliveEnemies[Math.floor(Math.random() * aliveEnemies.length)];
                target.chatText = message;
                target.chatTimer = 180; // 3초
            } else {
                // 적이 없다면 아군 플레이어가 직접 말함 (테스트 확인용)
                player.chatText = message;
                player.chatTimer = 180;
            }
        }

        function updateChzzkUIStatus(connected) {
            let statusEl = document.getElementById('chzzkStatus');
            let btnConnect = document.getElementById('btnConnectChzzk');
            let btnDisconnect = document.getElementById('btnDisconnectChzzk');
            if (connected) {
                if (statusEl) statusEl.innerHTML = "연결됨 🟢";
                if (statusEl) statusEl.style.color = "#10b981";
                if (btnConnect) btnConnect.style.display = "none";
                if (btnDisconnect) btnDisconnect.style.display = "block";
            } else {
                if (statusEl) statusEl.innerHTML = "연결 끊김 🔴";
                if (statusEl) statusEl.style.color = "#ef4444";
                if (btnConnect) btnConnect.style.display = "block";
                if (btnDisconnect) btnDisconnect.style.display = "none";
            }
        }

        function addSystemLog(text) {
            let logEl = document.getElementById('chzzkLog');
            if (logEl) {
                logEl.innerText += "\n" + text;
                logEl.scrollTop = logEl.scrollHeight;
            }
        }

        function sendTestChat() {
            let inputEl = document.getElementById('testChatInput');
            if (inputEl && inputEl.value.trim().length > 0) {
                handleReceivedChat(inputEl.value.trim());
                inputEl.value = "";
            }
        }

        // 치지직 UI 이벤트 바인딩
        let btnOpenChzzk = document.getElementById('btnOpenChzzkUI');
        let btnCloseChzzk = document.getElementById('btnCloseChzzkUI');
        let chzzkUI = document.getElementById('chzzkUI');
        
        if (btnOpenChzzk) {
            btnOpenChzzk.addEventListener('click', () => {
                if (chzzkUI) {
                    chzzkUI.style.display = 'flex';
                    setTimeout(() => chzzkUI.classList.add('show'), 10);
                }
            });
        }
        if (btnCloseChzzk) {
            btnCloseChzzk.addEventListener('click', () => {
                if (chzzkUI) {
                    chzzkUI.classList.remove('show');
                    setTimeout(() => chzzkUI.style.display = 'none', 200);
                }
            });
        }
        
        let btnConnectChzzk = document.getElementById('btnConnectChzzk');
        if (btnConnectChzzk) {
            btnConnectChzzk.addEventListener('click', () => {
                let inputVal = document.getElementById('chzzkChannelId').value.trim();
                if (!inputVal) {
                    alert("치지직 채널 ID 또는 방송 URL을 입력해주세요.");
                    return;
                }
                
                // URL 형태인 경우 정규식 또는 문자열 조작을 통해 채널 ID 추출
                let channelId = inputVal;
                if (inputVal.includes('chzzk.naver.com/')) {
                    let parts = inputVal.split('chzzk.naver.com/');
                    if (parts.length > 1) {
                        let subParts = parts[1].split(/[/?#]/);
                        if (subParts[0] === 'live' && subParts.length > 1) {
                            channelId = subParts[1];
                        } else {
                            channelId = subParts[0];
                        }
                    }
                }
                addSystemLog(`추출된 채널 ID: ${channelId}`);
                connectChzzk(channelId);
            });
        }
        let btnDisconnectChzzk = document.getElementById('btnDisconnectChzzk');
        if (btnDisconnectChzzk) {
            btnDisconnectChzzk.addEventListener('click', () => {
                if (chzzkSocket) chzzkSocket.close();
            });
        }
        
        let btnSendTest = document.getElementById('btnSendTestChat');
        if (btnSendTest) {
            btnSendTest.addEventListener('click', sendTestChat);
        }
        let testInput = document.getElementById('testChatInput');
        if (testInput) {
            testInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendTestChat();
            });
        }

        initLevel(currentSeed);
        loop();
    </script>
