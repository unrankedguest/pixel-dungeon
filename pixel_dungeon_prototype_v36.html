<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>횡스크롤 원거리 가챠 액션 게임 프로토타입 v29</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --bg-radial: radial-gradient(circle at center, #0e0e18 0%, #030306 100%);
            --panel-bg: rgba(12, 12, 20, 0.85);
            --border-glow: rgba(99, 102, 241, 0.15);
            --border-card: rgba(255, 255, 255, 0.06);
            --accent-gold: #fbbf24;
            --accent-rose: #f43f5e;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-indigo: #6366f1;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; outline: none; }
        
        body {
            background-color: var(--bg-dark);
            background-image: var(--bg-radial);
            color: var(--text-main);
            font-family: 'Outfit', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
        }

        .game-wrapper {
            width: 100vw;
            height: 100vh;
            max-width: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 2px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 20px;
            margin: 0 0 4px 0;
            color: #ffffff;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 30%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.3));
        }

        .description {
            display: none;
        }

        .description::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-indigo);
            box-shadow: 0 0 8px var(--accent-indigo);
        }

        #canvasContainer {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(99, 102, 241, 0.1);
            overflow: hidden;
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            background: #09090d;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
            width: 100%;
            height: 100%;
            object-fit: contain;
            touch-action: none;
        }

        .control-panel {
            display: none;
        }

        .char-select {
            display: flex;
            gap: 8px;
        }

        button {
            font-family: 'Orbitron', 'Outfit', sans-serif;
            background: rgba(255, 255, 255, 0.03);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transform: translateY(-1px);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        /* Ayn - Gold Accent */
        #btnChar0.active {
            background: rgba(251, 191, 36, 0.12);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            text-shadow: 0 0 5px rgba(251, 191, 36, 0.4);
            box-shadow: 0 0 12px rgba(251, 191, 36, 0.2), inset 0 0 8px rgba(251, 191, 36, 0.05);
        }
        #btnChar0::after {
            content: '';
            position: absolute;
            bottom: 0; left: 15%; right: 15%; height: 2px;
            background: var(--accent-gold);
            opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 0 8px var(--accent-gold);
        }
        #btnChar0.active::after { opacity: 1; }

        /* Luna - Rose Accent */
        #btnChar1.active {
            background: rgba(244, 63, 94, 0.12);
            border-color: var(--accent-rose);
            color: var(--accent-rose);
            text-shadow: 0 0 5px rgba(244, 63, 94, 0.4);
            box-shadow: 0 0 12px rgba(244, 63, 94, 0.2), inset 0 0 8px rgba(244, 63, 94, 0.05);
        }
        #btnChar1::after {
            content: '';
            position: absolute;
            bottom: 0; left: 15%; right: 15%; height: 2px;
            background: var(--accent-rose);
            opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 0 8px var(--accent-rose);
        }
        #btnChar1.active::after { opacity: 1; }

        /* Seria - Cyan Accent */
        #btnChar2.active {
            background: rgba(6, 182, 212, 0.12);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            text-shadow: 0 0 5px rgba(6, 182, 212, 0.4);
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.2), inset 0 0 8px rgba(6, 182, 212, 0.05);
        }
        #btnChar2::after {
            content: '';
            position: absolute;
            bottom: 0; left: 15%; right: 15%; height: 2px;
            background: var(--accent-cyan);
            opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 0 8px var(--accent-cyan);
        }
        #btnChar2.active::after { opacity: 1; }

        .seed-panel {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #94a3b8;
            font-weight: 600;
        }

        input {
            background-color: rgba(0, 0, 0, 0.4);
            color: #f3f4f6;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 6px 10px;
            width: 80px;
            border-radius: 8px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent-indigo);
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.3);
            background-color: rgba(0, 0, 0, 0.6);
        }

        .seed-panel button {
            background: var(--accent-indigo);
            border-color: var(--accent-indigo);
            color: white;
            padding: 7px 14px;
        }
        .seed-panel button:hover {
            background: #4f46e5;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.35);
        }

        /* 샵 오버레이 UI */
        #shopUI {
            position: absolute;
            top: 12%;
            left: 50%;
            transform: translate(-50%, -10px);
            background: rgba(8, 8, 12, 0.9);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(251, 191, 36, 0.3);
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
            box-shadow: 0 0 35px rgba(251, 191, 36, 0.08), 0 25px 50px rgba(0, 0, 0, 0.95);
            width: 320px;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #shopUI.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        #shopUI h3 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            color: var(--accent-gold);
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.3);
        }

        #shopItemsContainer {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        #shopItemsContainer button {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 44px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            padding: 0 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #shopItemsContainer button:not(.bought) {
            background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 100%), var(--btn-color, #6366f1);
            border-color: var(--btn-color, #6366f1);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        #shopItemsContainer button.bought {
            background: #18181b !important;
            border-color: rgba(255, 255, 255, 0.04) !important;
            color: var(--text-muted) !important;
            cursor: not-allowed;
        }

        #shopItemsContainer button:hover:not(:disabled):not(.bought) {
            transform: scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), 0 0 10px var(--btn-color);
        }

        #shopItemsContainer button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            filter: none;
        }

        .shop-cost-tag {
            background: rgba(0, 0, 0, 0.35);
            padding: 3px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #btnHealFull {
            width: 100%;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;
            color: white !important;
            border: none !important;
            padding: 10px !important;
            font-weight: 700 !important;
            border-radius: 8px !important;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Outfit', sans-serif !important;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        
        #btnHealFull:hover:not(:disabled) {
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.35);
            transform: scale(1.02);
        }

        #btnHealFull:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #btnReroll {
            width: 100%;
            background: transparent !important;
            color: #cbd5e1 !important;
            border: 1px solid rgba(99, 102, 241, 0.3) !important;
            padding: 9px !important;
            border-radius: 8px !important;
            cursor: pointer;
            font-family: 'Outfit', sans-serif !important;
            transition: all 0.2s !important;
        }

        #btnReroll:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.08) !important;
            border-color: var(--accent-indigo) !important;
            color: #ffffff !important;
        }
        
        #btnReroll:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* 게임오버 스크린 */
        #gameOverScreen {
            display: none; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(3, 3, 5, 0.9); 
            z-index: 10; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #gameOverScreen.show {
            opacity: 1;
        }

        #gameOverScreen h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 36px;
            margin: 0 0 12px 0;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #f43f5e 0%, #be123c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(244, 63, 94, 0.5));
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(244, 63, 94, 0.4)); }
            50% { filter: drop-shadow(0 0 16px rgba(244, 63, 94, 0.7)); }
        }

        .go-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            padding: 16px 36px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            margin-bottom: 24px;
        }

        .go-card p {
            margin: 0;
            font-size: 15px;
            color: #94a3b8;
            font-family: 'Outfit', sans-serif;
        }

        .go-card strong {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
        }

        #gameOverScreen button {
            background: var(--accent-indigo);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 14px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
        }

        #gameOverScreen button:hover {
            background: #4f46e5;
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
            transform: scale(1.03);
        }

        /* 치지직 설정 오버레이 UI */
        .overlay-panel {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -10px);
            background: rgba(8, 8, 12, 0.95);
            padding: 22px;
            border-radius: 16px;
            border: 1px solid rgba(6, 182, 212, 0.35); /* Cyan 네온 테두리 */
            z-index: 10;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            pointer-events: auto;
            box-shadow: 0 0 35px rgba(6, 182, 212, 0.08), 0 25px 50px rgba(0, 0, 0, 0.95);
            width: 340px;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .overlay-panel.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .overlay-panel h3 {
            margin: 0;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 15px;
            letter-spacing: 1.5px;
            color: var(--accent-cyan);
            text-shadow: 0 0 8px rgba(6, 182, 212, 0.4);
        }

        .chzzk-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            align-items: flex-start;
        }

        .chzzk-input-group label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
        }

        .chzzk-input-group input {
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            color: white;
            font-size: 12px;
            font-family: 'Outfit', sans-serif;
        }
        
        .chzzk-input-group input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 8px rgba(6, 182, 212, 0.25);
        }

        .chzzk-input-group small {
            font-size: 9px;
            color: #64748b;
        }

        .chzzk-btn-group {
            display: flex;
            gap: 8px;
            width: 100%;
        }

        .chzzk-btn-group button {
            flex-grow: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
        }

        #btnConnectChzzk {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            border: none;
            color: white;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.2);
        }
        #btnConnectChzzk:hover {
            box-shadow: 0 6px 16px rgba(6, 182, 212, 0.35);
            transform: scale(1.02);
        }

        .status-indicator {
            font-size: 11px;
            font-weight: 700;
            color: #cbd5e1;
        }

        .chzzk-log {
            width: 100%;
            height: 70px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: #a7f3d0;
            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap;
        }

        .close-btn {
            width: 100%;
            background: transparent;
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .close-btn:hover {
            background: rgba(255,255,255,0.03);
            color: white;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <header>
            <h1>Pixel Dungeon Action</h1>
        </header>

        <div id="canvasContainer">
            <canvas id="gameCanvas" width="960" height="480"></canvas>
            
            <!-- 치지직 설정 열기 버튼 -->
            <button id="btnOpenChzzkUI" style="position: absolute; top: 12px; right: 12px; z-index: 9; background: rgba(8, 8, 12, 0.75); border: 1px solid rgba(255, 255, 255, 0.15); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; padding: 0; cursor: pointer; transition: all 0.2s;" onmouseover="this.style.background='rgba(6, 182, 212, 0.25)'; this.style.borderColor='rgba(6, 182, 212, 0.6)'" onmouseout="this.style.background='rgba(8, 8, 12, 0.75)'; this.style.borderColor='rgba(255, 255, 255, 0.15)'">⚙️</button>

            <!-- 치지직 설정 오버레이 UI -->
            <div id="chzzkUI" class="overlay-panel">
                <h3>📢 CHZZK CHAT SYNC</h3>
                <div class="chzzk-input-group">
                    <label>치지직 채널 ID 또는 방송 URL</label>
                    <input type="text" id="chzzkChannelId" placeholder="예: https://chzzk.naver.com/...">
                    <small style="color: #64748b; font-size: 9px;">※ 스트리머 채널 주소를 그대로 붙여넣으세요.</small>
                </div>
                <div class="chzzk-btn-group">
                    <button id="btnConnectChzzk">연동 시작</button>
                    <button id="btnDisconnectChzzk" style="display:none; background:#be123c; border:none; color:white; box-shadow:0 4px 12px rgba(190,18,60,0.2);">연동 종료</button>
                </div>
                <div class="status-indicator">
                    상태: <span id="chzzkStatus" style="color:#ef4444;">연결 끊김 🔴</span>
                </div>
                
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.08); width:100%; margin:12px 0;">
                
                <div class="chzzk-input-group">
                    <label>테스트용 가상 채팅 입력</label>
                    <div style="display:flex; gap:6px; width:100%;">
                        <input type="text" id="testChatInput" placeholder="하고 싶은 말을 입력하세요." style="flex-grow:1; width:auto;">
                        <button id="btnSendTestChat" style="padding:6px 12px; font-size:11px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); color:white; border-radius:8px; cursor:pointer;">말하기</button>
                    </div>
                </div>
                
                <div id="chzzkLog" class="chzzk-log">채널 주소를 입력하고 [연동 시작]을 누르면 즉시 채팅이 게임에 연동됩니다.</div>
                <button id="btnCloseChzzkUI" class="close-btn">닫기</button>
            </div>
            
            <!-- 상점 오버레이 UI -->
            <div id="shopUI">
                <h3>⚙️ ARCADE SHOP (<span id="shopGoldDisplay">0</span>G)</h3>
                <div id="shopItemsContainer"></div>
                <button id="btnHealFull">
                    <span>❤️ 전체 체력 회복</span>
                    <span class="shop-cost-tag">100G</span>
                </button>
                <button id="btnReroll">🔄 상품 리롤 (50G)</button>
            </div>

            <!-- 게임오버 스크린 -->
            <div id="gameOverScreen">
                <h2>GAME OVER</h2>
                <div class="go-card">
                    <p>도달한 라운드: <strong id="goRound" style="color: #38bdf8;">1</strong></p>
                    <p>처치한 적: <strong id="goKills" style="color: #eab308;">0</strong></p>
                </div>
                <button onclick="restartGame()">재도전</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 안전한 사운드 이펙트 (Lazy Initialization)
        // ==========================================
        let audioCtx = null;

        const sfx = {
            init: function() {
                if (!audioCtx) {
                    try {
                        const AudioContext = window.AudioContext || window.webkitAudioContext;
                        audioCtx = new AudioContext();
                    } catch (e) {
                        console.warn("Web Audio API not supported.", e);
                    }
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(e => {});
                }
            },
            playTone: function(freq, type, duration, vol, slide) {
                try {
                    sfx.init();
                    if (!audioCtx) return;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    if (slide) {
                        osc.frequency.exponentialRampToValueAtTime(freq + slide, audioCtx.currentTime + duration);
                    }
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(audioCtx.currentTime + duration);
                } catch(e) {}
            },
            playNoise: function(duration, vol) {
                try {
                    sfx.init();
                    if (!audioCtx) return;
                    const bufferSize = audioCtx.sampleRate * duration;
                    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    const noise = audioCtx.createBufferSource();
                    noise.buffer = buffer;
                    const gain = audioCtx.createGain();
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 1000;
                    
                    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                    
                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(audioCtx.destination);
                    noise.start();
                } catch(e) {}
            },
            shoot: () => sfx.playTone(550, 'square', 0.08, 0.02, -250),
            jump: () => sfx.playTone(280, 'square', 0.18, 0.02, 280),
            hit: () => sfx.playNoise(0.06, 0.04),

        function seededRandom(seed) {
            let x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }

        function generateShopItemsSeeded(s) {
            let items = [];
            for (let i = 0; i < 3; i++) {
                if (seededRandom(s++) > 0.75) {
                    let r = seededRandom(s++);
                    let type, name, color; 
                    if (r < 0.25) { type = "SPEC_JUMP"; name = "🦘 도약력+"; color = "#c084fc"; }
                    else if (r < 0.5) { type = "SPEC_HOVER"; name = "🚀 체공량+"; color = "#f472b6"; }
                    else if (r < 0.75) { type = "SPEC_HP"; name = "🧬 최대HP+"; color = "#a855f7"; }
                    else { type = "SPEC_WALL_PIERCE"; name = "🌀 지형관통+"; color = "#fb923c"; }
                    items.push({ type: type, name: name, color: color, bought: false });
                } else {
                    let r = seededRandom(s++);
                    let type, name, color; 
                    if (r < 0.33) { type = "UPGRADE_RAPID"; name = "⚡ 연사력+"; color = "#38bdf8"; }
                    else if (r < 0.66) { type = "UPGRADE_SPREAD"; name = "🏹 확산탄+"; color = "#4ade80"; }
                    else { type = "UPGRADE_POWER"; name = "🔥 화력+"; color = "#f87171"; }
                    items.push({ type: type, name: name, color: color, bought: false });
                }
            }
            return items;
        }

        function generateShopItemsRandomly() {
            let s = Math.floor(Math.random() * 999999);
            return generateShopItemsSeeded(s);
        }

        function generateChunk(cx, cy, baseSeed) {
            let chunkKey = cx + "," + cy;
            if (activeChunks.has(chunkKey)) return;
            activeChunks.add(chunkKey);

            let s = baseSeed + cx * 374761393 + cy * 668265263;
            let startX = cx * CHUNK_W;
            let startY = cy * CHUNK_H;
            let roundLevel = Math.max(1, cy + 1); 
            let isSecretArea = (cy < 0);
            let isBossRound = (!isSecretArea && roundLevel % 5 === 0);
            
            let numPlatforms = (isSecretArea ? 10 : 25) + Math.floor(seededRandom(s++) * 15); 
            for (let i = 0; i < numPlatforms; i++) {
                let typeRand = seededRandom(s++);
                let pw, ph, px, py;

                if (typeRand < 0.50) {
                    pw = 80 + Math.floor(seededRandom(s++) * 120);
                    ph = 20;
                    px = startX + Math.floor(seededRandom(s++) * (CHUNK_W - pw));
                    py = startY + 150 + Math.floor(seededRandom(s++) * (CHUNK_H - 300));
                    platforms.push({ chunkKey: chunkKey, x: px, y: py, w: pw, h: ph, isRoundFloor: false, isOneWay: false });
                } else if (typeRand < 0.80) {
                    pw = 25;
                    ph = 120 + Math.floor(seededRandom(s++) * 150);
                    px = startX + Math.floor(seededRandom(s++) * (CHUNK_W - pw));
                    py = startY + 150 + Math.floor(seededRandom(s++) * (CHUNK_H - ph - 200));
                    platforms.push({ chunkKey: chunkKey, x: px, y: py, w: pw, h: ph, isRoundFloor: false, isOneWay: false });
                } else {
                    let stepW = 60;
                    pw = stepW * 3;
                    ph = 20;
                    px = startX + Math.floor(seededRandom(s++) * (CHUNK_W - pw - 60));
                    py = startY + 250 + Math.floor(seededRandom(s++) * (CHUNK_H - 450));
                    for (let step = 0; step < 3; step++) {
                        platforms.push({ chunkKey: chunkKey, x: px + (step * stepW), y: py - (step * 35), w: stepW, h: 20, isRoundFloor: false, isOneWay: false });
                    }
                    pw = stepW; 
                }

                let isSafeZone = (cx === 0 && cy === 0 && px < 1200 && py < 1000);

                if (!isSafeZone && !isSecretArea && seededRandom(s++) > 0.25) { 
                    let eRand = seededRandom(s++);
                    let eType, eColor, eHpBase, eW, eH;
                    
                    if (roundLevel <= 2) {
                        if (eRand < 0.4) { eType = "RANGED"; eColor = "#a78bfa"; eHpBase = 30; eW = 20; eH = 24; }
                        else { eType = "DASHER"; eColor = "#fb923c"; eHpBase = 40; eW = 20; eH = 24; }
                    } else if (roundLevel <= 4) {
                        if (eRand < 0.3) { eType = "RANGED"; eColor = "#a78bfa"; eHpBase = 30; eW = 20; eH = 24; }
                        else if (eRand < 0.8) { eType = "DASHER"; eColor = "#fb923c"; eHpBase = 40; eW = 20; eH = 24; }
                        else { eType = "TANK"; eColor = "#ef4444"; eHpBase = 120; eW = 32; eH = 36; }
                    } else if (roundLevel <= 6) {
                        if (eRand < 0.2) { eType = "RANGED"; eColor = "#a78bfa"; eHpBase = 30; eW = 20; eH = 24; }
                        else if (eRand < 0.6) { eType = "DASHER"; eColor = "#fb923c"; eHpBase = 40; eW = 20; eH = 24; }
                        else if (eRand < 0.8) { eType = "TANK"; eColor = "#ef4444"; eHpBase = 120; eW = 32; eH = 36; }
                        else { eType = "FLYER"; eColor = "#14b8a6"; eHpBase = 25; eW = 16; eH = 16; }
                    } else {
                        if (eRand < 0.2) { eType = "RANGED"; eColor = "#a78bfa"; eHpBase = 30; eW = 20; eH = 24; }
                        else if (eRand < 0.4) { eType = "DASHER"; eColor = "#fb923c"; eHpBase = 40; eW = 20; eH = 24; }
                        else if (eRand < 0.6) { eType = "TANK"; eColor = "#ef4444"; eHpBase = 120; eW = 32; eH = 36; }
                        else if (eRand < 0.8) { eType = "FLYER"; eColor = "#14b8a6"; eHpBase = 25; eW = 16; eH = 16; }
                        else { eType = "BOMBER"; eColor = "#84cc16"; eHpBase = 35; eW = 20; eH = 24; }
                    }

                    let hpMult = 1 + (roundLevel * 0.15);
                    enemies.push({
                        chunkKey: chunkKey, isBoss: false,
                        spawnX: px + (pw / 2) - (eW / 2),
                        x: px + (pw / 2) - (eW / 2), y: py - eH, 
                        w: eW, h: eH,
                        hp: Math.floor(eHpBase * hpMult), maxHp: Math.floor(eHpBase * hpMult),
                        type: eType, color: eColor,
                        cooldown: 0, state: "ROAM", timer: 0, vx: 0, vy: 0, grounded: false,
                        roamDir: Math.random() > 0.5 ? 1 : -1,
                        roamTimer: Math.floor(Math.random() * 60), dead: false, flashTimer: 0
                    });
                }

                let boxChance = isSecretArea ? 0.90 : 0.93; 
                if (seededRandom(s++) > boxChance) {
                    let randType = seededRandom(s++);
                    let itemType = randType < 0.33 ? "UPGRADE_RAPID" : (randType < 0.66 ? "UPGRADE_SPREAD" : "UPGRADE_POWER");
                    let itemColor = itemType === "UPGRADE_RAPID" ? "#38bdf8" : (itemType === "UPGRADE_SPREAD" ? "#4ade80" : "#f87171");
                    
                    if (isSecretArea && randType < 0.1) { 
                        itemType = "SPEC_HP"; itemColor = "#a855f7";
                    }
                    items.push({ chunkKey: chunkKey, x: px + 20, y: py - 20, w: 20, h: 20, type: itemType, picked: false, color: itemColor });
                }
            }

            if (!isSecretArea) {
                let floorY = startY + CHUNK_H;
                let gateWidth = 200 + Math.floor(seededRandom(s++) * 100); 
                let gateCenter = startX + 200 + Math.floor(seededRandom(s++) * (CHUNK_W - 400));
                
                let leftFloorWidth = (gateCenter - gateWidth/2) - startX;
                let rightFloorStartX = gateCenter + gateWidth/2;
                let rightFloorWidth = (startX + CHUNK_W) - rightFloorStartX;

                platforms.push({ chunkKey: chunkKey, x: startX, y: floorY, w: leftFloorWidth, h: 40, isRoundFloor: true, isOneWay: false });
                platforms.push({ chunkKey: chunkKey, x: rightFloorStartX, y: floorY, w: rightFloorWidth, h: 40, isRoundFloor: true, isOneWay: false });
                platforms.push({ chunkKey: chunkKey, x: gateCenter - gateWidth/2, y: floorY, w: gateWidth, h: 10, isRoundFloor: true, isOneWay: true, isLocked: isBossRound });

                if (isBossRound) {
                    let bossRand = seededRandom(s++);
                    let bType, bColor, bHpBase, bW, bH;
                    
                    if (bossRand < 0.33) { bType = "BOSS_RANGED"; bColor = "#7c3aed"; bHpBase = 600; bW = 32; bH = 36; }
                    else if (bossRand < 0.66) { bType = "BOSS_DASHER"; bColor = "#c2410c"; bHpBase = 800; bW = 36; bH = 40; }
                    else { bType = "BOSS_BOMBER"; bColor = "#4d7c0f"; bHpBase = 700; bW = 32; bH = 36; }
                    
                    let hpMult = 1 + (roundLevel * 0.2); 
                    enemies.push({
                        chunkKey: chunkKey, isBoss: true,
                        spawnX: gateCenter - bW/2,
                        x: gateCenter - bW/2, y: floorY - bH - 10, 
                        w: bW, h: bH,
                        hp: Math.floor(bHpBase * hpMult), maxHp: Math.floor(bHpBase * hpMult),
                        type: bType, color: bColor,
                        cooldown: 0, state: "ROAM", timer: 0, vx: 0, vy: 0, grounded: false,
                        roamDir: Math.random() > 0.5 ? 1 : -1,
                        roamTimer: 60, dead: false, flashTimer: 0
                    });
                }

                if (seededRandom(s++) > 0.70 && (leftFloorWidth > 100 || rightFloorWidth > 100)) {
                    let shopX = (leftFloorWidth > rightFloorWidth) ? startX + leftFloorWidth / 2 - 40 : rightFloorStartX + rightFloorWidth / 2 - 40;
                    shops.push({
                        chunkKey: chunkKey,
                        x: shopX, y: floorY - 60, w: 80, h: 60,
                        items: generateShopItemsSeeded(s),
                        rerollCost: 50
                    });
                }
            }
        }

        function updateChunks() {
            let pcx = Math.floor(player.x / CHUNK_W);
            let pcy = Math.floor(player.y / CHUNK_H);

            let requiredChunks = new Set();
            for (let cx = pcx - 1; cx <= pcx + 1; cx++) {
                for (let cy = pcy - 1; cy <= pcy + 1; cy++) {
                    requiredChunks.add(cx + "," + cy);
                    generateChunk(cx, cy, currentSeed);
                }
            }

            for (let key of activeChunks) {
                if (!requiredChunks.has(key) && key !== "init") {
                    platforms = platforms.filter(p => p.chunkKey !== key);
                    enemies = enemies.filter(e => e.chunkKey !== key);
                    items = items.filter(i => i.chunkKey !== key);
                    drops = drops.filter(d => d.chunkKey !== key);
                    shops = shops.filter(s => {
                        if (s.chunkKey === key && currentShop === s) closeShopUI();
                        return s.chunkKey !== key;
                    });
                    activeChunks.delete(key);
                }
            }
        }

        function initLevel(seed) {

            platforms = []; enemies = []; bullets = []; enemyBullets = []; items = []; particles = []; shops = []; drops = [];

            closeShopUI();
            
            initParallaxStars();
            damageTexts = [];
            shakeTimer = 0;
            
            player.hp = characters[currentCharIndex].maxHp;
            player.maxHp = characters[currentCharIndex].maxHp;
            player.x = 0; player.y = 200; player.vx = 0; player.vy = 0;
            player.maxHoverGauge = 200;
            player.hoverGauge = 200;
            player.stats = { rapid: 0, spread: 0, power: 0, jump: 0, hover: 0, hpUp: 0, wallPierce: 0 };
            player.gold = 0; player.invulnerable = 0; player.flashTimer = 0;
            
            enemiesKilled = 0; gameActive = true;
            let goScreen = document.getElementById('gameOverScreen');
            goScreen.classList.remove('show');
            goScreen.style.display = 'none';

            cameraX = player.x - 960 / 2 + player.width / 2;
            cameraY = player.y - 480 / 2 + player.height / 2;

            platforms.push({ chunkKey: "init", x: -CHUNK_W*2, y: -CHUNK_H*2, w: CHUNK_W*4, h: 40, isRoundFloor: true, isOneWay: false });
            platforms.push({ chunkKey: "init", x: -200, y: 300, w: 400, h: 20, isRoundFloor: false, isOneWay: false });
            updateChunks();
        }

            let btn0 = document.getElementById('btnChar0');
            let btn1 = document.getElementById('btnChar1');

            if (btn1) btn1.className = index === 1 ? 'active' : '';
            if (btn2) btn2.className = index === 2 ? 'active' : '';
            initLevel(currentSeed);

            let newSeed = Math.floor(Math.random() * 99999);
            let mapSeedInput = document.getElementById('mapSeed');
            if (mapSeedInput) mapSeedInput.value = newSeed;
            currentSeed = newSeed;
            initLevel(currentSeed);

            let mapSeedInput = document.getElementById('mapSeed');
            if (mapSeedInput) {
                let seedVal = parseInt(mapSeedInput.value);
                if (!isNaN(seedVal)) {
                    currentSeed = seedVal;
                    initLevel(currentSeed);
